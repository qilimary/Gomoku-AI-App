                  private static Combo parseAirplane(int[] counts, int n) {
                      for (int start = 3; start <= 14; start++) {
                          for (int end = start + 1; end <= 14; end++) {
                              int k = end - start + 1;
                              boolean body = true;
                              for (int r = start; r <= end; r++) {
                                  if (counts[r] < 3) { body = false; break; }
                              }
                              if (!body) continue;
          
                              int remain = n - k * 3;
                              if (remain == 0) {
                                  boolean exact = true;
                                  for (int r = 3; r <= 17; r++) {
                                      int left = counts[r] - (r >= start && r <= end ? 3 : 0);
                                      if (left != 0) { exact = false; break; }
                                  }
                                  if (exact) return new Combo(Combo.AIRPLANE, end, n, k);
                              } else if (remain == k) {
                                  int leftCards = 0;
                                  boolean ok = true;
                                  for (int r = 3; r <= 17; r++) {
                                      int left = counts[r] - (r >= start && r <= end ? 3 : 0);
                                      if (left < 0 || (r >= start && r <= end && left != 0)) {
                                          ok = false;
                                          break;
                                      }
                                      leftCards += left;
                                  }
                                  if (ok && leftCards == k) {
                                      return new Combo(Combo.AIRPLANE_SINGLE, end, n, k);
                                  }
                              } else if (remain == k * 2) {
                                  int pairCount = 0;
                                  boolean ok = true;
                                  for (int r = 3; r <= 17; r++) {
                                      int left = counts[r] - (r >= start && r <= end ? 3 : 0);
                                      if (r >= start && r <= end && left != 0) { ok = false; break; }
                                      if (left == 0) continue;
                                      if (left != 2) { ok = false; break; }
                                      pairCount++;
                                  }
                                  if (ok && pairCount == k) {
                                      return new Combo(Combo.AIRPLANE_PAIR, end, n, k);
                                  }
                              }
                          }
                      }
                      return null;
                  }
          
