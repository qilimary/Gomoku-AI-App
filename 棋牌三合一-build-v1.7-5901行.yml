                  private final Runnable aiCountdownRunnable = new Runnable() {
                      @Override
                      public void run() {
                          if (!aiThinking) return;
                          long elapsed = Math.max(0L,
                                  (System.currentTimeMillis() - aiThinkingStartedAt) / 1000L);
                          aiCountdownSeconds = Math.max(0,
                                  AI_COUNTDOWN_TOTAL_SECONDS - (int) elapsed);
                          invalidate();
                          if (aiThinking && aiCountdownSeconds > 0) {
                              handler.postDelayed(this, 250L);
                          }
                      }
                  };
          
                  PokerView(Context context) {
                      super(context);
                      density = getResources().getDisplayMetrics().density;
                      paint.setTypeface(android.graphics.Typeface.create("sans", android.graphics.Typeface.NORMAL));
                      stroke.setStyle(Paint.Style.STROKE);
                      stroke.setStrokeWidth(dp(2));
                      setLayerType(View.LAYER_TYPE_SOFTWARE, null);
                  }
          
                  private void startAiCountdown() {
                      handler.removeCallbacks(aiCountdownRunnable);
                      aiThinkingStartedAt = System.currentTimeMillis();
                      aiCountdownSeconds = AI_COUNTDOWN_TOTAL_SECONDS;
                      handler.post(aiCountdownRunnable);
                  }
          
                  private void stopAiCountdown() {
                      handler.removeCallbacks(aiCountdownRunnable);
                      aiCountdownSeconds = AI_COUNTDOWN_TOTAL_SECONDS;
                  }
          
                  void shutdown() {
                      aiToken.incrementAndGet();
                      aiThinking = false;
                      stopAiCountdown();
                      handler.removeCallbacksAndMessages(null);
                      executor.shutdownNow();
                  }
          
