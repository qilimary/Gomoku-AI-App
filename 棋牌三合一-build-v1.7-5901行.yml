                  private void drawBtn(Canvas canvas, String text, float left, float top,
                                       float right, float bottom, int bg, int fg, float textSize) {
                      paint.setStyle(Paint.Style.FILL);
                      paint.setColor(bg);
                      canvas.drawRoundRect(left, top, right, bottom, w * 0.02f, w * 0.02f, paint);
                      paint.setColor(fg);
                      paint.setTextSize(textSize);
                      paint.setTextAlign(Paint.Align.CENTER);
                      Paint.FontMetrics fm = paint.getFontMetrics();
                      canvas.drawText(text, left + (right - left) / 2f,
                              top + (bottom - top) / 2f - (fm.descent + fm.ascent) / 2f, paint);
                  }
          
