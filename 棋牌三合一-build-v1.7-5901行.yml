                      ArrayList<Card> copy = new ArrayList<>(cards);
                      copy.sort(CARD_COMPARATOR);
                      Combo combo = parse(copy);
                      if (!combo.valid()) return;
                      StringBuilder key = new StringBuilder();
                      key.append(combo.type).append(':');
                      for (Card c : copy) key.append(c.rank).append(',');
                      if (!seen.add(key.toString())) return;
                      out.add(new Play(copy, combo));
