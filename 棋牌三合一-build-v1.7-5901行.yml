                  private final short[] perfectTtDepths = new short[PERFECT_TT_SIZE];
                  private final byte[] perfectTtFlags = new byte[PERFECT_TT_SIZE];
                  private final byte[] perfectTtAges = new byte[PERFECT_TT_SIZE];
                  private final long[] perfectTtBestMasks = new long[PERFECT_TT_SIZE];
                  private byte perfectTtAge = 1;
                  // 同一手牌与桌面牌型的合法着在搜索树中会重复出现，缓存后只复制列表、不重复生成对象。
                  private final HashMap<Long, ArrayList<Play>> perfectMoveCache = new HashMap<>();
                  private boolean perfectTimedOut = false;
          
                  long budgetMillis(int difficulty) {
                      switch (difficulty) {
                          case HARD: return 20_000L;
                          case MASTER: return 25_000L;
                          case OMNISCIENT: return 25_000L;
                          default: return 14_000L;
                      }
                  }
          
                  int bid(int player, List<Card> hand, int currentBid, int difficulty,
                          List<Card>[] allHands, List<Card> bottom) {
                      double score = handStrength(hand);
                      if (difficulty == OMNISCIENT && allHands != null && bottom != null) {
                          // 透视档在叫分时连底牌和另外两家的真实强度也纳入计算。
                          ArrayList<Card> projected = new ArrayList<>(hand);
                          projected.addAll(bottom);
                          double projectedStrength = handStrength(projected);
                          double strongestOpponent = 0.0;
                          double combinedOpponent = 0.0;
                          for (int p = 0; p < allHands.length; p++) {
                              if (p == player || allHands[p] == null) continue;
                              double strength = handStrength(allHands[p]);
                              strongestOpponent = Math.max(strongestOpponent, strength);
                              combinedOpponent += strength;
                          }
                          score = projectedStrength
                                  + Math.max(-1.5, projectedStrength - strongestOpponent) * 0.52
                                  + Math.max(-1.0, projectedStrength * 2.0 - combinedOpponent) * 0.12;
                      } else {
                          double noise;
                          if (difficulty == NORMAL) noise = 0.46;
                          else if (difficulty == HARD) noise = 0.16;
                          else noise = 0.035;
                          score += random.nextDouble() * noise - noise / 2.0;
                          if (difficulty >= HARD) score += controlPotential(hand) / 520.0;
                      }
                      int target = score >= 7.6 ? 3 : score >= 4.8 ? 2 : score >= 2.6 ? 1 : 0;
                      return target > currentBid ? target : 0;
                  }
          
                  private double handStrength(List<Card> hand) {
                      int[] counts = countRanks(hand);
                      double score = 0.0;
                      for (int r = 3; r <= 15; r++) {
                          if (counts[r] == 4) score += 3.5;
                          else if (counts[r] == 3) score += r >= 12 ? 1.25 : 0.55;
                          else if (counts[r] == 2 && r >= 13) score += 0.28;
                      }
                      if (counts[17] == 1) score += 3.0;
                      if (counts[16] == 1) score += 2.15;
                      score += counts[15] * 1.28 + counts[14] * 0.58;
                      int turns = estimateTurns(hand);
                      score += Math.max(0, 10 - turns) * 0.48;
                      score += structureScore(hand) / 180.0;
                      return score;
                  }
          
                  Play choosePlay(int player, List<Card> hand, Combo table, int lastPlayer,
                                  int passCount, int landlord, int[] remainingCounts, List<Card> played,
                                  List<Card> visibleBottom, List<Card>[] allHands,
                                  int difficulty, long deadlineNanos) {
                      if (difficulty == OMNISCIENT && allHands != null) {
                          return choosePerfectInfoPlay(player, allHands, table, lastPlayer,
                                  passCount, landlord, deadlineNanos);
                      }
                      return chooseFairPlay(player, hand, table, lastPlayer, landlord,
                              remainingCounts, played, visibleBottom, difficulty, deadlineNanos);
                  }
          
                  private Play chooseFairPlay(int player, List<Card> hand, Combo table, int lastPlayer,
                                              int landlord, int[] remainingCounts, List<Card> played,
                                              List<Card> visibleBottom, int difficulty,
                                              long deadlineNanos) {
                      int candidateLimit = difficulty >= MASTER ? 1_800
                              : difficulty == HARD ? 1_200 : 800;
                      ArrayList<Play> legal = DoudizhuRules.generateLegalPlays(
                              hand, table, candidateLimit);
                      if (legal.isEmpty()) return null;
          
                      boolean teammateLed = player != landlord && lastPlayer >= 0
                              && lastPlayer != landlord && lastPlayer != player;
                      int enemy = player == landlord ? nextOpponentWithFewest(player, remainingCounts)
                              : landlord;
                      int enemyRemain = remainingCounts[enemy];
          
                      ArrayList<Play> riskTargets = new ArrayList<>(legal);
                      if (teammateLed && table != null) {
                          riskTargets.add(new Play(Collections.emptyList(), table));
                      }
                      long now = System.nanoTime();
                      boolean trivialDecision = legal.size() == 1 && !(teammateLed && table != null);
                      long desiredSamplingMillis;
                      int sampleCount;
                      if (trivialDecision) {
                          desiredSamplingMillis = 45L;
                          sampleCount = 180;
                      } else if (difficulty >= MASTER) {
                          desiredSamplingMillis = 8_500L;
                          sampleCount = Integer.MAX_VALUE;
                      } else if (difficulty == HARD) {
                          desiredSamplingMillis = 4_500L;
                          sampleCount = 1_200_000;
                      } else {
                          desiredSamplingMillis = 1_200L;
                          sampleCount = 5_000;
                      }
                      long reserveNanos = 420_000_000L;
                      long latestSamplingEnd = Math.max(now, deadlineNanos - reserveNanos);
                      long samplingDeadline = Math.min(latestSamplingEnd,
                              now + desiredSamplingMillis * 1_000_000L);
                      Map<String, Double> responseRisk = estimateRelevantResponseRisk(player, hand,
                              riskTargets, remainingCounts, played, visibleBottom, landlord,
                              sampleCount, samplingDeadline);
          
                      double teammateTableRisk = table == null ? 0.0
                              : responseRisk.getOrDefault(comboSignature(table), 0.5);
                      int turnWeight = difficulty >= MASTER ? 246 : difficulty == HARD ? 228 : 210;
                      int sequenceBonus = difficulty >= MASTER ? 124 : difficulty == HARD ? 106 : 90;
                      int safeControlWeight = difficulty >= MASTER ? 3 : difficulty == HARD ? 2 : 1;
                      int splitWeight = difficulty >= MASTER ? 3 : difficulty == HARD ? 2 : 1;
                      double normalRiskWeight = difficulty >= MASTER ? 390.0
                              : difficulty == HARD ? 305.0 : 220.0;
                      double urgentRiskWeight = difficulty >= MASTER ? 720.0
                              : difficulty == HARD ? 555.0 : 410.0;
          
                      Play best = null;
                      int bestScore = Integer.MIN_VALUE;
                      for (Play play : legal) {
                          if (System.nanoTime() >= deadlineNanos) break;
                          ArrayList<Card> remain = new ArrayList<>(hand);
                          removeCards(remain, play.cards);
                          int turns = estimateTurns(remain);
                          int score = -turns * turnWeight + play.cards.size() * 8
                                  + structureScore(remain) * (difficulty + 2) / 2;
                          boolean finishes = remain.isEmpty();
                          if (finishes) score += PERFECT_WIN;
          
                          score -= controlCost(play);
                          score -= splitStructurePenalty(hand, play) * splitWeight;
                          score += controlPotential(remain) * safeControlWeight / 4;
                          if (play.combo.type == Combo.BOMB) {
                              score -= enemyRemain <= 2 ? 35
                                      : difficulty >= MASTER ? 285 : 245;
                          }
                          if (play.combo.type == Combo.ROCKET) {
                              score -= enemyRemain <= 2 ? 55
                                      : difficulty >= MASTER ? 455 : 400;
                          }
          
                          if (table != null) {
                              score -= play.combo.mainRank * 3;
                              if (enemyRemain <= 2 && !teammateLed) {
                                  score += play.combo.mainRank * (difficulty >= MASTER ? 25 : 19);
                              }
                          } else if (isSequence(play.combo)) {
                              score += sequenceBonus;
                          }
          
                          double risk = responseRisk.getOrDefault(comboSignature(play.combo), 0.5);
                          if (!responseRisk.isEmpty()) {
                              score += (int) ((1.0 - risk)
                                      * (enemyRemain <= 2 ? urgentRiskWeight : normalRiskWeight));
                          }
          
                          if (enemyRemain == 1) {
                              if (play.combo.type == Combo.SINGLE) {
                                  score += play.combo.mainRank * (difficulty >= MASTER ? 34 : 25);
                                  if (difficulty >= HARD && play.combo.mainRank < 12) score -= 190;
                              } else {
                                  score += difficulty >= MASTER ? 230 : 145;
                              }
                          } else if (enemyRemain == 2 && play.combo.type != Combo.SINGLE) {
                              score += difficulty >= MASTER ? 105 : 62;
                          }
          
                          if (teammateLed) {
                              double emergencyThreshold = difficulty >= MASTER ? 0.27
                                      : difficulty == HARD ? 0.31 : 0.36;
                              double improvementMargin = difficulty >= MASTER ? 0.035
                                      : difficulty == HARD ? 0.05 : 0.07;
                              boolean emergency = enemyRemain <= 2
                                      && teammateTableRisk >= emergencyThreshold
                                      && risk + improvementMargin < teammateTableRisk;
                              if (finishes) {
                                  score += PERFECT_WIN;
                              } else if (emergency) {
                                  score += 410 + (int) ((teammateTableRisk - risk)
                                          * (difficulty >= MASTER ? 1_120.0 : 760.0));
                              } else {
                                  int letPenalty = remainingCounts[lastPlayer] <= 2
                                          ? (difficulty >= MASTER ? 3_100 : 2_100)
                                          : (difficulty >= MASTER ? 1_650 : 1_200);
                                  score -= letPenalty;
                              }
                          }
          
                          if (difficulty == NORMAL) score += random.nextInt(17) - 8;
                          else if (difficulty == HARD) score += random.nextInt(5) - 2;
                          play.score = score;
                          if (score > bestScore) {
                              bestScore = score;
                              best = play;
                          }
                      }
          
                      if (best == null) best = legal.get(0);
                      if (teammateLed && table != null) {
                          ArrayList<Card> afterBest = new ArrayList<>(hand);
                          removeCards(afterBest, best.cards);
                          if (afterBest.isEmpty()) return best;
          
                          double bestRisk = responseRisk.getOrDefault(comboSignature(best.combo), 0.5);
                          double emergencyThreshold = difficulty >= MASTER ? 0.27
                                  : difficulty == HARD ? 0.31 : 0.36;
                          double improvementMargin = difficulty >= MASTER ? 0.035
                                  : difficulty == HARD ? 0.05 : 0.07;
                          boolean emergency = enemyRemain <= 2
                                  && teammateTableRisk >= emergencyThreshold
                                  && bestRisk + improvementMargin < teammateTableRisk;
                          if (remainingCounts[lastPlayer] <= (difficulty >= HARD ? 3 : 2)
                                  && enemyRemain > 1) return null;
                          if (!emergency) return null;
                          if ((best.combo.type == Combo.BOMB || best.combo.type == Combo.ROCKET)
                                  && enemyRemain > 1
                                  && teammateTableRisk < (difficulty >= MASTER ? 0.82 : 0.72)) {
                              return null;
                          }
                      }
                      return best;
                  }
          
                  private void beginPerfectSearchCaches() {
                      perfectTimedOut = false;
                      perfectTtAge++;
                      if (perfectTtAge == 0) {
                          Arrays.fill(perfectTtAges, (byte) 0);
                          perfectTtAge = 1;
                      }
                      perfectMoveCache.clear();
                  }
          
                  private long handMask(List<Card> hand) {
                      long mask = 0L;
                      for (Card card : hand) mask |= 1L << card.id;
                      return mask;
                  }
          
                  private long playMask(Play play) {
                      if (play == null) return 0L;
                      long mask = 0L;
                      for (Card card : play.cards) mask |= 1L << card.id;
                      return mask;
                  }
          
                  private long perfectMoveCacheKey(List<Card> hand, Combo table, int limit) {
                      long meta = limit & 0x7FFFL;
                      if (table != null) {
                          meta |= ((long) (table.type + 1) << 15)
                                  | ((long) table.mainRank << 20)
                                  | ((long) table.cardCount << 25)
                                  | ((long) table.serialLength << 31);
                      }
                      return mix64(handMask(hand) ^ Long.rotateLeft(meta, 17)
                              ^ 0xD1B54A32D192ED03L);
                  }
          
                  private ArrayList<Play> generatePerfectPlays(List<Card> hand, Combo table, int limit) {
                      long key = perfectMoveCacheKey(hand, table, limit);
                      ArrayList<Play> cached = perfectMoveCache.get(key);
                      if (cached == null) {
                          cached = DoudizhuRules.generateLegalPlays(hand, table, limit);
                          if (perfectMoveCache.size() < PERFECT_MOVE_CACHE_LIMIT) {
                              perfectMoveCache.put(key, cached);
                          }
                      }
                      return new ArrayList<>(cached);
                  }
          
                  private void promotePerfectMove(ArrayList<Play> plays, long preferredMask) {
                      if (preferredMask == 0L) return;
                      for (int i = 0; i < plays.size(); i++) {
                          if (playMask(plays.get(i)) == preferredMask) {
                              if (i > 0) Collections.swap(plays, 0, i);
                              return;
                          }
                      }
                  }
          
                  private int searchPerfectPass(ArrayList<Card>[] hands, int currentPlayer,
                                                Combo table, int lastPlayer, int passCount,
                                                int landlord, int rootPlayer, int depth,
                                                int alpha, int beta, int ply, long deadlineNanos) {
                      int nextPass = passCount + 1;
                      int nextTurn;
                      Combo nextTable = table;
                      int nextPassCount = nextPass;
                      if (nextPass >= 2) {
                          nextTurn = lastPlayer;
                          nextTable = null;
                          nextPassCount = 0;
                      } else {
                          nextTurn = (currentPlayer + 1) % 3;
                      }
                      return perfectSearch(hands, nextTurn, nextTable, lastPlayer,
                              nextPassCount, landlord, rootPlayer, depth,
                              alpha, beta, ply, deadlineNanos);
                  }
          
                  private Play choosePerfectInfoPlay(int player, List<Card>[] sourceHands,
                                                     Combo table, int lastPlayer, int passCount,
                                                     int landlord, long deadlineNanos) {
                      @SuppressWarnings("unchecked")
                      ArrayList<Card>[] searchHands = new ArrayList[]{
                              new ArrayList<>(sourceHands[0]),
                              new ArrayList<>(sourceHands[1]),
                              new ArrayList<>(sourceHands[2])
                      };
                      for (ArrayList<Card> cards : searchHands) cards.sort(CARD_COMPARATOR);
                      beginPerfectSearchCaches();
          
                      ArrayList<Play> legal = generatePerfectPlays(searchHands[player], table, 2_400);
                      if (legal.isEmpty()) return null;
                      orderPerfectRootPlays(legal, searchHands[player], player, landlord, table, lastPlayer);
          
                      Play completedBest = legal.get(0);
                      int quickBest = Integer.MIN_VALUE;
                      for (Play play : legal) {
                          int quick = perfectRootHeuristic(play, searchHands[player], player,
                                  landlord, table, lastPlayer);
                          if (quick > quickBest) {
                              quickBest = quick;
                              completedBest = play;
                          }
                      }
          
                      int totalCards = totalCards(searchHands);
                      int maxDepth = totalCards <= 18 ? 64
                              : totalCards <= 26 ? 40
                              : totalCards <= 38 ? 28 : 20;
                      long preferredRootMask = playMask(completedBest);
          
                      for (int depth = 2; depth <= maxDepth && System.nanoTime() < deadlineNanos; depth++) {
                          perfectTimedOut = false;
                          promotePerfectMove(legal, preferredRootMask);
                          Play iterationBest = null;
                          int iterationBestScore = Integer.MIN_VALUE;
                          int alpha = -PERFECT_WIN - 100;
                          int beta = PERFECT_WIN + 100;
                          boolean explored = false;
          
                          for (Play play : legal) {
                              if (System.nanoTime() >= deadlineNanos) {
                                  perfectTimedOut = true;
                                  break;
                              }
                              ArrayList<Card> actingHand = searchHands[player];
                              removeCards(actingHand, play.cards);
                              int score;
                              try {
                                  if (actingHand.isEmpty()) {
                                      score = PERFECT_WIN;
                                  } else if (!explored) {
                                      score = perfectSearch(searchHands, (player + 1) % 3,
                                              play.combo, player, 0, landlord, player,
                                              depth - 1, alpha, beta, 1, deadlineNanos);
                                  } else {
                                      score = perfectSearch(searchHands, (player + 1) % 3,
                                              play.combo, player, 0, landlord, player,
                                              depth - 1, alpha, Math.min(beta, alpha + 1),
                                              1, deadlineNanos);
                                      if (!perfectTimedOut && score > alpha && score < beta) {
                                          score = perfectSearch(searchHands, (player + 1) % 3,
                                                  play.combo, player, 0, landlord, player,
                                                  depth - 1, alpha, beta, 1, deadlineNanos);
                                      }
                                  }
                              } finally {
                                  // 合法牌生成与哈希均与手牌顺序无关，恢复后无需在每个节点重新排序。
                                  actingHand.addAll(play.cards);
                              }
                              if (perfectTimedOut) break;
                              explored = true;
                              if (score > iterationBestScore) {
                                  iterationBestScore = score;
                                  iterationBest = play;
                              }
                              alpha = Math.max(alpha, iterationBestScore);
                              if (iterationBestScore >= PERFECT_WIN - 50) break;
                          }
          
                          if (!perfectTimedOut && table != null) {
                              int passScore;
                              if (!explored) {
                                  passScore = searchPerfectPass(searchHands, player, table,
                                          lastPlayer, passCount, landlord, player,
                                          depth - 1, alpha, beta, 1, deadlineNanos);
                              } else {
                                  passScore = searchPerfectPass(searchHands, player, table,
                                          lastPlayer, passCount, landlord, player,
                                          depth - 1, alpha, Math.min(beta, alpha + 1),
                                          1, deadlineNanos);
                                  if (!perfectTimedOut && passScore > alpha && passScore < beta) {
                                      passScore = searchPerfectPass(searchHands, player, table,
                                              lastPlayer, passCount, landlord, player,
                                              depth - 1, alpha, beta, 1, deadlineNanos);
                                  }
                              }
                              if (!perfectTimedOut && passScore > iterationBestScore) {
                                  iterationBestScore = passScore;
                                  iterationBest = null;
                              }
                          }
          
                          if (perfectTimedOut) break;
                          completedBest = iterationBest;
                          preferredRootMask = playMask(iterationBest);
                          if (Math.abs(iterationBestScore) >= PERFECT_WIN - 50) break;
                      }
                      return completedBest;
                  }
          
                  private int perfectSearch(ArrayList<Card>[] hands, int currentPlayer,
                                            Combo table, int lastPlayer, int passCount,
                                            int landlord, int rootPlayer, int depth,
                                            int alpha, int beta, int ply, long deadlineNanos) {
                      if (System.nanoTime() >= deadlineNanos) {
                          perfectTimedOut = true;
                          return evaluatePerfectState(hands, currentPlayer, table,
                                  lastPlayer, landlord, rootPlayer, ply);
                      }
          
                      for (int p = 0; p < 3; p++) {
                          if (hands[p].isEmpty()) {
                              return sameTeam(p, rootPlayer, landlord)
                                      ? PERFECT_WIN - ply : -PERFECT_WIN + ply;
                          }
                      }
                      if (depth <= 0) {
                          return evaluatePerfectState(hands, currentPlayer, table,
                                  lastPlayer, landlord, rootPlayer, ply);
                      }
          
                      long key = perfectStateHash(hands, currentPlayer, table, lastPlayer,
                              passCount, landlord);
                      int originalAlpha = alpha;
                      int originalBeta = beta;
                      int ttIndex = (int) key & PERFECT_TT_MASK;
                      boolean ttMatch = perfectTtAges[ttIndex] == perfectTtAge
                              && perfectTtKeys[ttIndex] == key;
                      long ttBestMask = ttMatch ? perfectTtBestMasks[ttIndex] : -1L;
                      if (ttMatch && (perfectTtDepths[ttIndex] & 0xFFFF) >= depth) {
                          int ttValue = perfectTtValues[ttIndex];
                          byte flag = perfectTtFlags[ttIndex];
                          if (flag == TT_EXACT) return ttValue;
                          if (flag == TT_LOWER) alpha = Math.max(alpha, ttValue);
                          else if (flag == TT_UPPER) beta = Math.min(beta, ttValue);
                          if (alpha >= beta) return ttValue;
                      }
          
                      int total = totalCards(hands);
                      int generationLimit = total <= 18 ? 1_300
                              : total <= 26 ? (table == null ? 400 : 650)
                              : (table == null ? 260 : 460);
                      ArrayList<Play> legal = generatePerfectPlays(
                              hands[currentPlayer], table, generationLimit);
                      boolean maximizing = sameTeam(currentPlayer, rootPlayer, landlord);
                      orderPerfectSearchPlays(legal, hands[currentPlayer], currentPlayer,
                              landlord, rootPlayer, table, lastPlayer, maximizing);
                      if (ttBestMask > 0L) promotePerfectMove(legal, ttBestMask);
          
                      int keep = total <= 18 ? legal.size()
                              : total <= 26 ? (table == null ? 144 : 240)
                              : (table == null ? 96 : 190);
                      if (legal.size() > keep) legal = new ArrayList<>(legal.subList(0, keep));
          
                      int best = maximizing ? -PERFECT_WIN - 200 : PERFECT_WIN + 200;
                      long bestMask = 0L;
                      boolean explored = false;
                      boolean passFirst = table != null && ttMatch && ttBestMask == 0L;
          
                      if (passFirst) {
                          int value = searchPerfectPass(hands, currentPlayer, table,
                                  lastPlayer, passCount, landlord, rootPlayer,
                                  depth - 1, alpha, beta, ply + 1, deadlineNanos);
                          if (!perfectTimedOut) {
                              explored = true;
                              best = value;
                              bestMask = 0L;
                              if (maximizing) alpha = Math.max(alpha, best);
                              else beta = Math.min(beta, best);
                          }
                      }
          
                      for (Play play : legal) {
                          if (perfectTimedOut || System.nanoTime() >= deadlineNanos) {
                              perfectTimedOut = true;
                              break;
                          }
                          if (alpha >= beta) break;
                          ArrayList<Card> actingHand = hands[currentPlayer];
                          removeCards(actingHand, play.cards);
                          int value;
                          try {
                              if (actingHand.isEmpty()) {
                                  value = sameTeam(currentPlayer, rootPlayer, landlord)
                                          ? PERFECT_WIN - ply : -PERFECT_WIN + ply;
                              } else if (!explored) {
                                  value = perfectSearch(hands, (currentPlayer + 1) % 3,
                                          play.combo, currentPlayer, 0, landlord, rootPlayer,
                                          depth - 1, alpha, beta, ply + 1, deadlineNanos);
                              } else if (maximizing) {
                                  value = perfectSearch(hands, (currentPlayer + 1) % 3,
                                          play.combo, currentPlayer, 0, landlord, rootPlayer,
                                          depth - 1, alpha, Math.min(beta, alpha + 1),
                                          ply + 1, deadlineNanos);
                                  if (!perfectTimedOut && value > alpha && value < beta) {
                                      value = perfectSearch(hands, (currentPlayer + 1) % 3,
                                              play.combo, currentPlayer, 0, landlord, rootPlayer,
                                              depth - 1, alpha, beta, ply + 1, deadlineNanos);
                                  }
                              } else {
                                  value = perfectSearch(hands, (currentPlayer + 1) % 3,
                                          play.combo, currentPlayer, 0, landlord, rootPlayer,
                                          depth - 1, Math.max(alpha, beta - 1), beta,
                                          ply + 1, deadlineNanos);
                                  if (!perfectTimedOut && value < beta && value > alpha) {
                                      value = perfectSearch(hands, (currentPlayer + 1) % 3,
                                              play.combo, currentPlayer, 0, landlord, rootPlayer,
                                              depth - 1, alpha, beta, ply + 1, deadlineNanos);
                                  }
                              }
                          } finally {
                              actingHand.addAll(play.cards);
                          }
                          if (perfectTimedOut) break;
                          explored = true;
          
                          if (maximizing) {
                              if (value > best) {
                                  best = value;
                                  bestMask = playMask(play);
                              }
                              if (best > alpha) alpha = best;
                          } else {
                              if (value < best) {
                                  best = value;
                                  bestMask = playMask(play);
                              }
                              if (best < beta) beta = best;
                          }
                      }
          
                      if (!perfectTimedOut && table != null && !passFirst && alpha < beta) {
                          int value;
                          if (!explored) {
                              value = searchPerfectPass(hands, currentPlayer, table,
                                      lastPlayer, passCount, landlord, rootPlayer,
                                      depth - 1, alpha, beta, ply + 1, deadlineNanos);
                          } else if (maximizing) {
                              value = searchPerfectPass(hands, currentPlayer, table,
                                      lastPlayer, passCount, landlord, rootPlayer,
                                      depth - 1, alpha, Math.min(beta, alpha + 1),
                                      ply + 1, deadlineNanos);
                              if (!perfectTimedOut && value > alpha && value < beta) {
                                  value = searchPerfectPass(hands, currentPlayer, table,
                                          lastPlayer, passCount, landlord, rootPlayer,
                                          depth - 1, alpha, beta, ply + 1, deadlineNanos);
                              }
                          } else {
                              value = searchPerfectPass(hands, currentPlayer, table,
                                      lastPlayer, passCount, landlord, rootPlayer,
                                      depth - 1, Math.max(alpha, beta - 1), beta,
                                      ply + 1, deadlineNanos);
                              if (!perfectTimedOut && value < beta && value > alpha) {
                                  value = searchPerfectPass(hands, currentPlayer, table,
                                          lastPlayer, passCount, landlord, rootPlayer,
                                          depth - 1, alpha, beta, ply + 1, deadlineNanos);
                              }
                          }
                          if (!perfectTimedOut) {
                              explored = true;
                              if (maximizing) {
                                  if (value > best) { best = value; bestMask = 0L; }
                                  if (best > alpha) alpha = best;
                              } else {
                                  if (value < best) { best = value; bestMask = 0L; }
                                  if (best < beta) beta = best;
                              }
                          }
                      }
          
                      if (!explored || perfectTimedOut) {
                          return evaluatePerfectState(hands, currentPlayer, table,
                                  lastPlayer, landlord, rootPlayer, ply);
                      }
          
                      byte flag = best <= originalAlpha ? TT_UPPER
                              : best >= originalBeta ? TT_LOWER : TT_EXACT;
                      int oldDepth = perfectTtDepths[ttIndex] & 0xFFFF;
                      if (perfectTtAges[ttIndex] != perfectTtAge
                              || perfectTtKeys[ttIndex] != key || depth >= oldDepth) {
                          perfectTtKeys[ttIndex] = key;
                          perfectTtValues[ttIndex] = best;
                          perfectTtDepths[ttIndex] = (short) Math.min(32_767, depth);
                          perfectTtFlags[ttIndex] = flag;
                          perfectTtBestMasks[ttIndex] = bestMask;
                          perfectTtAges[ttIndex] = perfectTtAge;
                      }
                      return best;
                  }
          
                  private int evaluatePerfectState(ArrayList<Card>[] hands, int currentPlayer,
                                                   Combo table, int lastPlayer, int landlord,
                                                   int rootPlayer, int ply) {
                      for (int p = 0; p < 3; p++) {
                          if (hands[p].isEmpty()) {
                              return sameTeam(p, rootPlayer, landlord)
                                      ? PERFECT_WIN - ply : -PERFECT_WIN + ply;
                          }
                      }
                      int farmerA = (landlord + 1) % 3;
                      int farmerB = (landlord + 2) % 3;
                      int landlordTurns = estimateTurns(hands[landlord]);
                      int farmerTurns = Math.min(estimateTurns(hands[farmerA]),
                              estimateTurns(hands[farmerB]));
                      int farmerCards = Math.min(hands[farmerA].size(), hands[farmerB].size());
                      int landlordCards = hands[landlord].size();
          
                      int landlordView = (farmerTurns - landlordTurns) * 360
                              + (farmerCards - landlordCards) * 21;
                      int landlordControl = controlPotential(hands[landlord]);
                      int farmerControl = Math.max(controlPotential(hands[farmerA]),
                              controlPotential(hands[farmerB]));
                      landlordView += (landlordControl - farmerControl) * 3 / 2;
                      if (farmerCards <= 2) landlordView -= (3 - farmerCards) * 190;
                      if (landlordCards <= 2) landlordView += (3 - landlordCards) * 215;
                      landlordView += currentPlayer == landlord ? 48 : -48;
                      if (lastPlayer >= 0) landlordView += lastPlayer == landlord ? 68 : -68;
                      if (table != null) {
                          boolean canRespond = canBeat(hands[currentPlayer], table);
                          if (canRespond) landlordView += currentPlayer == landlord ? 88 : -88;
                          else landlordView += currentPlayer == landlord ? -105 : 105;
                          if (table.type == Combo.BOMB || table.type == Combo.ROCKET) {
                              landlordView += lastPlayer == landlord ? 52 : -52;
                          }
                      }
                      if (hands[farmerA].size() <= 2 || hands[farmerB].size() <= 2) {
                          landlordView -= 95;
                      }
                      return rootPlayer == landlord ? landlordView : -landlordView;
                  }
          
                  private void orderPerfectRootPlays(ArrayList<Play> plays, List<Card> hand,
                                                     int player, int landlord, Combo table,
                                                     int lastPlayer) {
                      for (Play play : plays) {
                          play.score = perfectRootHeuristic(play, hand, player, landlord, table, lastPlayer);
                      }
                      plays.sort((a, b) -> Integer.compare(b.score, a.score));
                  }
          
                  private int perfectRootHeuristic(Play play, List<Card> hand, int player,
                                                   int landlord, Combo table, int lastPlayer) {
                      ArrayList<Card> remain = new ArrayList<>(hand);
                      removeCards(remain, play.cards);
                      if (remain.isEmpty()) return PERFECT_WIN;
                      int score = -estimateTurns(remain) * 230 + structureScore(remain)
                              + play.cards.size() * 10 - controlCost(play);
                      if (isSequence(play.combo)) score += 95;
                      if (play.combo.type == Combo.BOMB) score -= 180;
                      if (play.combo.type == Combo.ROCKET) score -= 280;
                      boolean teammateLed = player != landlord && lastPlayer >= 0
                              && lastPlayer != landlord && lastPlayer != player;
                      if (teammateLed && table != null) score -= 520;
                      return score;
                  }
          
                  private void orderPerfectSearchPlays(ArrayList<Play> plays, List<Card> hand,
                                                       int player, int landlord, int rootPlayer,
                                                       Combo table, int lastPlayer,
                                                       boolean maximizing) {
                      // 无论当前属于根方还是对手方，都先搜索当前走牌者自己最自然的着法。
                      // 预先计算一次分数，避免 Comparator 在排序中反复复制手牌和估算剩余手数。
                      for (Play play : plays) {
                          play.score = perfectRootHeuristic(play, hand, player, landlord, table, lastPlayer);
                      }
                      plays.sort((a, b) -> Integer.compare(b.score, a.score));
                  }
          
                  private int perfectSearchOrderScore(Play play, List<Card> hand,
                                                      int player, int landlord, int rootPlayer,
                                                      Combo table, int lastPlayer) {
                      int local = perfectRootHeuristic(play, hand, player, landlord, table, lastPlayer);
                      return sameTeam(player, rootPlayer, landlord) ? local : -local;
                  }
          
                  private boolean sameTeam(int a, int b, int landlord) {
                      return (a == landlord) == (b == landlord);
                  }
          
                  private int totalCards(List<Card>[] hands) {
                      return hands[0].size() + hands[1].size() + hands[2].size();
                  }
          
                  private long perfectStateHash(List<Card>[] hands, int currentPlayer,
                                                Combo table, int lastPlayer, int passCount,
                                                int landlord) {
                      long h0 = handMask(hands[0]);
                      long h1 = handMask(hands[1]);
                      long h2 = handMask(hands[2]);
                      long hash = mix64(h0 ^ 0x9E3779B97F4A7C15L)
                              ^ Long.rotateLeft(mix64(h1 ^ 0xD6E8FEB86659FD93L), 21)
                              ^ Long.rotateLeft(mix64(h2 ^ 0xA0761D6478BD642FL), 42);
                      long meta = currentPlayer | ((long) (lastPlayer + 1) << 3)
                              | ((long) passCount << 6) | ((long) landlord << 8);
                      if (table != null) {
                          meta |= ((long) (table.type + 1) << 12)
                                  | ((long) table.mainRank << 18)
                                  | ((long) table.cardCount << 23)
                                  | ((long) table.serialLength << 29);
                      }
                      return hash ^ mix64(meta + 0xE7037ED1A0B428DBL);
                  }
          
                  private long mix64(long z) {
                      z = (z ^ (z >>> 30)) * 0xBF58476D1CE4E5B9L;
                      z = (z ^ (z >>> 27)) * 0x94D049BB133111EBL;
                      return z ^ (z >>> 31);
                  }
          
                  Play chooseHint(List<Card> hand, Combo table) {
                      ArrayList<Play> legal = DoudizhuRules.generateLegalPlays(hand, table, 420);
                      if (legal.isEmpty()) return null;
                      Play best = null;
                      int bestScore = Integer.MIN_VALUE;
                      for (Play p : legal) {
                          ArrayList<Card> remain = new ArrayList<>(hand);
                          removeCards(remain, p.cards);
                          int score = -estimateTurns(remain) * 165 + structureScore(remain)
                                  - p.combo.mainRank * 2 + p.cards.size() * 7;
                          if (remain.isEmpty()) score += 999_999;
                          if (p.combo.type == Combo.BOMB || p.combo.type == Combo.ROCKET) score -= 250;
                          if (score > bestScore) { bestScore = score; best = p; }
                      }
                      return best;
                  }
          
                  private Map<String, Double> estimateRelevantResponseRisk(int player, List<Card> hand,
                                                                            List<Play> plays,
                                                                            int[] remainingCounts,
                                                                            List<Card> played,
                                                                            List<Card> visibleBottom,
                                                                            int landlord,
                                                                            int samples,
                                                                            long deadlineNanos) {
                      HashMap<String, Integer> beat = new HashMap<>();
                      HashMap<String, Integer> total = new HashMap<>();
                      ArrayList<Card> unknown = fullDeck();
                      removeCardsById(unknown, hand);
                      removeCardsById(unknown, played);
          
                      @SuppressWarnings("unchecked")
                      ArrayList<Card>[] knownOpponentCards = new ArrayList[]{new ArrayList<>(), new ArrayList<>(), new ArrayList<>()};
                      if (landlord != player && visibleBottom != null) {
                          for (Card bottom : visibleBottom) {
                              if (!containsCardId(played, bottom.id) && !containsCardId(hand, bottom.id)) {
                                  knownOpponentCards[landlord].add(bottom);
                              }
                          }
                          removeCardsById(unknown, knownOpponentCards[landlord]);
                      }
          
                      int leftId = (player + 1) % 3;
                      int rightId = (player + 2) % 3;
                      int leftNeed = Math.max(0, remainingCounts[leftId] - knownOpponentCards[leftId].size());
                      int rightNeed = Math.max(0, remainingCounts[rightId] - knownOpponentCards[rightId].size());
                      if (leftNeed + rightNeed > unknown.size()) return Collections.emptyMap();
          
                      ArrayList<Combo> uniqueCombos = new ArrayList<>();
                      HashSet<String> uniqueKeys = new HashSet<>();
                      for (Play p : plays) {
                          String key = comboSignature(p.combo);
                          if (uniqueKeys.add(key)) uniqueCombos.add(p.combo);
                      }
          
                      int[] leftBaseCounts = countRanks(knownOpponentCards[leftId]);
                      int[] rightBaseCounts = countRanks(knownOpponentCards[rightId]);
                      int[] leftCounts = new int[18];
                      int[] rightCounts = new int[18];
                      int leftHandSize = remainingCounts[leftId];
                      int rightHandSize = remainingCounts[rightId];
          
                      for (int s = 0; s < samples && System.nanoTime() < deadlineNanos; s++) {
                          Collections.shuffle(unknown, random);
                          System.arraycopy(leftBaseCounts, 0, leftCounts, 0, leftCounts.length);
                          System.arraycopy(rightBaseCounts, 0, rightCounts, 0, rightCounts.length);
                          for (int i = 0; i < leftNeed; i++) leftCounts[unknown.get(i).rank]++;
                          for (int i = 0; i < rightNeed; i++) {
                              rightCounts[unknown.get(leftNeed + i).rank]++;
                          }
          
                          for (Combo combo : uniqueCombos) {
                              String key = comboSignature(combo);
                              boolean canRespond;
                              if (player == landlord) {
                                  canRespond = canBeatCounts(leftCounts, leftHandSize, combo)
                                          || canBeatCounts(rightCounts, rightHandSize, combo);
                              } else if (landlord == leftId) {
                                  canRespond = canBeatCounts(leftCounts, leftHandSize, combo);
                              } else {
                                  canRespond = canBeatCounts(rightCounts, rightHandSize, combo);
                              }
                              total.put(key, total.getOrDefault(key, 0) + 1);
                              if (canRespond) beat.put(key, beat.getOrDefault(key, 0) + 1);
                          }
                      }
          
                      HashMap<String, Double> result = new HashMap<>();
                      for (Map.Entry<String, Integer> e : total.entrySet()) {
                          int t = e.getValue();
                          result.put(e.getKey(), t == 0 ? 0.5 : beat.getOrDefault(e.getKey(), 0) / (double) t);
                      }
                      return result;
                  }
          
                  private boolean canBeat(List<Card> hand, Combo table) {
                      return canBeatCounts(countRanks(hand), hand.size(), table);
                  }
          
                  private boolean canBeatCounts(int[] counts, int handSize, Combo table) {
                      if (counts[16] > 0 && counts[17] > 0 && table.type != Combo.ROCKET) return true;
                      if (table.type != Combo.ROCKET) {
                          int bombStart = table.type == Combo.BOMB ? table.mainRank + 1 : 3;
                          for (int r = bombStart; r <= 15; r++) if (counts[r] == 4) return true;
                      }
                      switch (table.type) {
                          case Combo.SINGLE:
                              for (int r = table.mainRank + 1; r <= 17; r++) if (counts[r] > 0) return true;
                              return false;
                          case Combo.PAIR:
                              for (int r = table.mainRank + 1; r <= 15; r++) if (counts[r] >= 2) return true;
                              return false;
                          case Combo.TRIO:
                              for (int r = table.mainRank + 1; r <= 15; r++) if (counts[r] >= 3) return true;
                              return false;
                          case Combo.TRIO_SINGLE:
                              for (int r = table.mainRank + 1; r <= 15; r++) if (counts[r] >= 3) {
                                  if (handSize - counts[r] >= 1) return true;
                              }
                              return false;
                          case Combo.TRIO_PAIR:
                              for (int r = table.mainRank + 1; r <= 15; r++) if (counts[r] >= 3) {
                                  for (int k = 3; k <= 15; k++) if (k != r && counts[k] >= 2) return true;
                              }
                              return false;
                          case Combo.STRAIGHT:
                              return hasSerial(counts, 1, table.serialLength, table.mainRank);
                          case Combo.PAIR_STRAIGHT:
                              return hasSerial(counts, 2, table.serialLength, table.mainRank);
                          case Combo.AIRPLANE:
                          case Combo.AIRPLANE_SINGLE:
                          case Combo.AIRPLANE_PAIR:
                              for (int end = table.mainRank + 1; end <= 14; end++) {
                                  int start = end - table.serialLength + 1;
                                  if (start < 3) continue;
                                  boolean body = true;
                                  for (int r = start; r <= end; r++) {
                                      if (counts[r] < 3) { body = false; break; }
                                  }
                                  if (!body) continue;
                                  if (table.type == Combo.AIRPLANE) return true;
                                  if (table.type == Combo.AIRPLANE_SINGLE) {
                                      int wings = 0;
                                      for (int r = 3; r <= 17; r++) {
                                          if (r < start || r > end) wings += counts[r];
                                      }
                                      if (wings >= table.serialLength) return true;
                                  } else {
                                      int pairs = 0;
                                      for (int r = 3; r <= 15; r++) {
                                          if ((r < start || r > end) && counts[r] >= 2) pairs++;
                                      }
                                      if (pairs >= table.serialLength) return true;
                                  }
                              }
                              return false;
                          case Combo.FOUR_TWO_SINGLE:
                              for (int r = table.mainRank + 1; r <= 15; r++) {
                                  if (counts[r] == 4 && handSize - 4 >= 2) return true;
                              }
                              return false;
                          case Combo.FOUR_TWO_PAIR:
                              for (int r = table.mainRank + 1; r <= 15; r++) if (counts[r] == 4) {
                                  int pairs = 0;
                                  for (int k = 3; k <= 15; k++) {
                                      if (k != r && counts[k] >= 2) pairs++;
                                  }
                                  if (pairs >= 2) return true;
                              }
                              return false;
                          case Combo.BOMB:
                          case Combo.ROCKET:
                          default:
                              return false;
                      }
                  }
          
                  private boolean hasSerial(int[] counts, int copies, int length, int minMainExclusive) {
                      for (int end = minMainExclusive + 1; end <= 14; end++) {
                          int start = end - length + 1;
                          if (start < 3) continue;
                          boolean ok = true;
                          for (int r = start; r <= end; r++) if (counts[r] < copies) { ok = false; break; }
                          if (ok) return true;
                      }
                      return false;
                  }
          
                  private int estimateTurns(List<Card> cards) {
                      if (cards.isEmpty()) return 0;
                      int[] counts = countRanks(cards);
                      int best = greedyTurns(counts, true);
                      best = Math.min(best, greedyTurns(counts, false));
                      best = Math.min(best, attachmentAwareTurns(counts, true));
                      best = Math.min(best, attachmentAwareTurns(counts, false));
                      return best;
                  }
          
                  private int greedyTurns(int[] original, boolean preferSequences) {
                      int[] c = original.clone();
                      int turns = 0;
                      if (c[16] > 0 && c[17] > 0) { c[16]--; c[17]--; turns++; }
                      if (preferSequences) {
                          turns += removeAirplanes(c);
                          turns += removePairStraights(c);
                          turns += removeStraights(c);
                      }
                      for (int r = 3; r <= 15; r++) if (c[r] == 4) { c[r] = 0; turns++; }
                      turns += removeAirplanes(c);
                      if (!preferSequences) {
                          turns += removePairStraights(c);
                          turns += removeStraights(c);
                      }
                      for (int r = 3; r <= 17; r++) {
                          if (c[r] >= 3) { c[r] -= 3; turns++; }
                      }
                      int singles = 0, pairs = 0;
                      for (int r = 3; r <= 17; r++) {
                          pairs += c[r] / 2;
                          singles += c[r] % 2;
                      }
                      turns += pairs + singles;
                      return Math.max(1, turns);
                  }
          
                  private int attachmentAwareTurns(int[] original, boolean sequenceFirst) {
                      int[] c = original.clone();
                      int turns = 0;
                      if (c[16] > 0 && c[17] > 0) { c[16]--; c[17]--; turns++; }
                      if (sequenceFirst) {
                          turns += removePairStraights(c);
                          turns += removeStraights(c);
                      }
                      turns += removeAirplanesWithWings(c);
                      if (!sequenceFirst) {
                          turns += removePairStraights(c);
                          turns += removeStraights(c);
                      }
                      for (int r = 3; r <= 15; r++) if (c[r] == 4) { c[r] = 0; turns++; }
          
                      for (int r = 3; r <= 15; r++) {
                          if (c[r] < 3) continue;
                          c[r] -= 3;
                          turns++;
                          int pairRank = findLowPair(c, r);
                          if (pairRank >= 0) c[pairRank] -= 2;
                          else {
                              int singleRank = findLowSingle(c, r);
                              if (singleRank >= 0) c[singleRank]--;
                          }
                      }
                      for (int r = 3; r <= 17; r++) {
                          turns += c[r] / 2;
                          turns += c[r] % 2;
                      }
                      return Math.max(1, turns);
                  }
          
                  private int removeAirplanesWithWings(int[] c) {
                      int turns = 0;
                      while (true) {
                          int bestStart = -1, bestLen = 0;
                          for (int start = 3; start <= 13; start++) {
                              int len = 0;
                              while (start + len <= 14 && c[start + len] >= 3) len++;
                              if (len >= 2 && len > bestLen) { bestStart = start; bestLen = len; }
                          }
                          if (bestStart < 0) break;
                          for (int r = bestStart; r < bestStart + bestLen; r++) c[r] -= 3;
                          turns++;
          
                          ArrayList<Integer> pairs = new ArrayList<>();
                          for (int r = 3; r <= 15; r++) {
                              if (r < bestStart || r >= bestStart + bestLen) {
                                  if (c[r] >= 2) pairs.add(r);
                              }
                          }
                          if (pairs.size() >= bestLen) {
                              for (int i = 0; i < bestLen; i++) c[pairs.get(i)] -= 2;
                          } else {
                              int need = bestLen;
                              for (int r = 3; r <= 17 && need > 0; r++) {
                                  if (r >= bestStart && r < bestStart + bestLen) continue;
                                  while (c[r] > 0 && need > 0) { c[r]--; need--; }
                              }
                          }
                      }
                      return turns;
                  }
          
                  private int findLowPair(int[] c, int excludedRank) {
                      for (int r = 3; r <= 15; r++) {
                          if (r != excludedRank && c[r] == 2) return r;
                      }
                      return -1;
                  }
          
                  private int findLowSingle(int[] c, int excludedRank) {
                      for (int r = 3; r <= 17; r++) {
                          if (r != excludedRank && c[r] == 1) return r;
                      }
                      for (int r = 3; r <= 17; r++) {
                          if (r != excludedRank && c[r] > 0) return r;
                      }
                      return -1;
                  }
          
                  private int removeStraights(int[] c) {
                      int turns = 0;
                      boolean changed;
                      do {
                          changed = false;
                          int bestStart = -1, bestLen = 0;
                          for (int start = 3; start <= 10; start++) {
                              int len = 0;
                              while (start + len <= 14 && c[start + len] > 0) len++;
                              if (len >= 5 && len > bestLen) { bestStart = start; bestLen = len; }
                          }
                          if (bestStart >= 0) {
                              for (int r = bestStart; r < bestStart + bestLen; r++) c[r]--;
                              turns++; changed = true;
                          }
                      } while (changed);
                      return turns;
                  }
          
                  private int removePairStraights(int[] c) {
                      int turns = 0;
                      boolean changed;
                      do {
                          changed = false;
                          int bestStart = -1, bestLen = 0;
                          for (int start = 3; start <= 12; start++) {
                              int len = 0;
                              while (start + len <= 14 && c[start + len] >= 2) len++;
                              if (len >= 3 && len > bestLen) { bestStart = start; bestLen = len; }
                          }
                          if (bestStart >= 0) {
                              for (int r = bestStart; r < bestStart + bestLen; r++) c[r] -= 2;
                              turns++; changed = true;
                          }
                      } while (changed);
                      return turns;
                  }
          
                  private int removeAirplanes(int[] c) {
                      int turns = 0;
                      boolean changed;
                      do {
                          changed = false;
                          int bestStart = -1, bestLen = 0;
                          for (int start = 3; start <= 13; start++) {
                              int len = 0;
                              while (start + len <= 14 && c[start + len] >= 3) len++;
                              if (len >= 2 && len > bestLen) { bestStart = start; bestLen = len; }
                          }
                          if (bestStart >= 0) {
                              for (int r = bestStart; r < bestStart + bestLen; r++) c[r] -= 3;
                              turns++; changed = true;
                          }
                      } while (changed);
                      return turns;
                  }
          
                  private int structureScore(List<Card> cards) {
                      int[] c = countRanks(cards);
                      int score = 0;
                      int singles = 0;
                      for (int r = 3; r <= 17; r++) {
                          if (c[r] == 1) singles++;
                          if (c[r] == 2) score += 5;
                          if (c[r] == 3) score += 13;
                          if (c[r] == 4) score += 42;
                      }
                      if (c[16] > 0 && c[17] > 0) score += 72;
                      score -= singles * 9;
                      return score;
                  }
          
                  private int splitStructurePenalty(List<Card> hand, Play play) {
                      int[] before = countRanks(hand);
                      int[] used = countRanks(play.cards);
                      int penalty = 0;
                      for (int r = 3; r <= 15; r++) {
                          if (used[r] == 0 || used[r] == before[r]) continue;
                          if (before[r] == 4) penalty += used[r] * 34;
                          else if (before[r] == 3) penalty += used[r] * 20;
                          else if (before[r] == 2 && used[r] == 1) penalty += 13;
                      }
                      if (before[16] > 0 && before[17] > 0
                              && used[16] + used[17] == 1) penalty += 58;
                      if (isSequence(play.combo)) penalty = penalty * 2 / 3;
                      return penalty;
                  }
          
                  private int controlPotential(List<Card> cards) {
                      int[] counts = countRanks(cards);
                      int score = counts[17] * 34 + counts[16] * 27
                              + counts[15] * 18 + counts[14] * 8;
                      for (int r = 3; r <= 15; r++) {
                          if (counts[r] == 4) score += 52 + r;
                          else if (counts[r] == 3 && r >= 12) score += 10;
                          else if (counts[r] == 2 && r >= 14) score += 7;
                      }
                      if (counts[16] > 0 && counts[17] > 0) score += 72;
                      return score;
                  }
          
                  private boolean isSequence(Combo combo) {
                      return combo.type == Combo.STRAIGHT || combo.type == Combo.PAIR_STRAIGHT
                              || combo.type == Combo.AIRPLANE || combo.type == Combo.AIRPLANE_SINGLE
                              || combo.type == Combo.AIRPLANE_PAIR;
                  }
          
                  private int controlCost(Play play) {
                      int cost = play.combo.mainRank * 2;
                      if (play.combo.mainRank >= 15) cost += 45;
                      if (play.combo.type == Combo.BOMB) cost += 120;
                      if (play.combo.type == Combo.ROCKET) cost += 200;
                      return cost;
                  }
          
                  private int nextOpponentWithFewest(int player, int[] remains) {
                      int a = (player + 1) % 3, b = (player + 2) % 3;
                      return remains[a] <= remains[b] ? a : b;
                  }
          
                  private static int[] countRanks(List<Card> cards) {
                      int[] counts = new int[18];
                      for (Card c : cards) counts[c.rank]++;
                      return counts;
                  }
          
                  private static String comboSignature(Combo combo) {
                      return combo.type + ":" + combo.mainRank + ":" + combo.cardCount + ":" + combo.serialLength;
                  }
          
                  private static boolean containsCardId(List<Card> cards, int id) {
                      for (Card c : cards) if (c.id == id) return true;
                      return false;
                  }
          
                  private static ArrayList<Card> fullDeck() {
                      ArrayList<Card> deck = new ArrayList<>(54);
                      int id = 0;
                      for (int rank = 3; rank <= 15; rank++) {
                          for (int suit = 0; suit < 4; suit++) deck.add(new Card(id++, rank, suit));
                      }
                      deck.add(new Card(id++, 16, 4));
                      deck.add(new Card(id, 17, 5));
                      return deck;
                  }
          
                  private static void removeCards(List<Card> target, List<Card> cards) {
                      for (Card c : cards) {
                          for (int i = 0; i < target.size(); i++) {
                              if (target.get(i).id == c.id) { target.remove(i); break; }
                          }
                      }
                  }
          
                  private static void removeCardsById(List<Card> target, List<Card> cards) {
                      removeCards(target, cards);
                  }
              }
          
