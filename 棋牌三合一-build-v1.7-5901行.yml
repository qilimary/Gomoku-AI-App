                      drawButton(canvas, hintBtn, hintSelectionActive ? "取消提示" : "提示",
                              hintSelectionActive ? 0xFF5689B8 : 0xFF6FA8DC,
                              Color.WHITE, height * 0.026f, hintSelectionActive);
                      drawButton(canvas, playBtn, "出牌", 0xFFFFC43D, 0xFF332300, height * 0.026f, false);
