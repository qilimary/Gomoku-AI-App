name: Build Android APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Auto Generate Android Configs
        run: |
          # 自动生成顶级 build.gradle
          cat << 'EOF' > build.gradle
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.2.2'
              }
          }
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          EOF
          
          # 自动生成 settings.gradle
          echo "include ':app'" > settings.gradle
          
          # 自动生成 app/build.gradle
          mkdir -p app
          cat << 'EOF' > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.gomoku.app'
              compileSdk 34
              defaultConfig {
                  applicationId "com.gomoku.app"
                  minSdk 26
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
          }
          EOF
          
          # 自动生成 AndroidManifest.xml
          mkdir -p app/src/main
          cat << 'EOF' > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="五子棋智能对战" android:theme="@android:style/Theme.DeviceDefault.NoActionBar">
                  <activity android:name="com.gomoku.app.MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Setup Gradle Wrapper
        run: gradle wrapper --gradle-version 8.5

      - name: Build APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Gomoku-AI-APK
          path: app/build/outputs/apk/debug/*.apk
