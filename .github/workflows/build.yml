                  private float currentBoardBottom() {
                      float boardWidth = w - 2f * margin;
                      if (currentGameType == 0) {
                          float top = margin + w * 0.25f;
                          return top + boardWidth;
                      }
                      float xiangqiHeight = boardWidth / 8f * 9f;
                      float top = margin + w * 0.25f - (xiangqiHeight - boardWidth) / 2f;
                      return top + xiangqiHeight;
                  }

                  private void requestAiInterrupt() {
                      if (currentGameType == 0 && g_aiThinking) {
                          rollbackAfterCancel = !g_moveHistory.isEmpty()
                                  && g_moveHistory.get(g_moveHistory.size() - 1)[2] == g_humanColor;
                          g_statusMsg = "正在中断思考...";
                          cancelSearchOnly();
                      } else if (currentGameType == 1 && x_aiThinking) {
                          // AI 是黑方思考时，当前仍为黑方，最后一步通常是玩家红方。
                          rollbackAfterCancel = !x_moveHistory.isEmpty();
                          x_statusMsg = "正在中断思考...";
                          cancelSearchOnly();
                      }
                      invalidate();
                  }

                  @Override
                  public boolean onTouchEvent(MotionEvent event) {
                      if (event.getAction() != MotionEvent.ACTION_DOWN) return true;
                      float ex = event.getX(), ey = event.getY();

                      float modeBtnW = w * 0.40f;
                      float modeBtnH = w * 0.12f;
                      float modeBtnX = w / 2f - modeBtnW / 2f;
                      float modeBtnY = margin;
                      float ruleBtnW = w * 0.10f;
                      float ruleBtnX = w - margin - ruleBtnW;

                      if (checkClick(ex, ey, ruleBtnX, margin,
                              ruleBtnX + ruleBtnW, margin + ruleBtnW)) {
                          showRulesDialog();
                          return true;
                      }
                      if (checkClick(ex, ey, modeBtnX, modeBtnY,
                              modeBtnX + modeBtnW, modeBtnY + modeBtnH)) {
                          if (g_aiThinking || x_aiThinking) return true;
                          if (currentGameType == 0) {
                              g_gameMode = 1 - g_gameMode;
                              restartGomoku(true);
                          } else {
                              x_gameMode = 1 - x_gameMode;
                              restartXiangqi(true);
                          }
                          return true;
                      }

                      float bottomY = currentBoardBottom() + w * 0.11f;
                      float btnW = w * 0.20f;
                      float btnH = w * 0.096f;
                      float space = (w - 3f * btnW) / 4f;
                      float row1Y = bottomY + w * 0.06f;

                      if (checkClick(ex, ey, space, row1Y, space + btnW, row1Y + btnH)) {
                          boolean thinking = currentGameType == 0 ? g_aiThinking : x_aiThinking;
                          if (thinking) requestAiInterrupt();
                          else if (currentGameType == 0) g_undoMove();
                          else x_undoMove();
                          return true;
                      }
                      if (checkClick(ex, ey, space * 2f + btnW, row1Y,
                              space * 2f + btnW * 2f, row1Y + btnH)) {
                          if (currentGameType == 0) {
                              if (!g_aiThinking) restartGomoku(true);
                          } else if (!x_aiThinking) {
                              restartXiangqi(true);
                          }
                          return true;
                      }
                      if (checkClick(ex, ey, space * 3f + btnW * 2f, row1Y,
                              space * 3f + btnW * 3f, row1Y + btnH)) {
                          saveGameState();
                          Context context = getContext();
                          if (context instanceof Activity) ((Activity) context).finish();
                          return true;
                      }

                      boolean thinking = currentGameType == 0 ? g_aiThinking : x_aiThinking;
                      int mode = currentGameType == 0 ? g_gameMode : x_gameMode;
                      float row3Y = row1Y;
                      if (mode == 0 && !thinking) {
                          float row2Y = row1Y + btnH + w * 0.04f;
                          row3Y = row2Y + btnH + w * 0.04f;
                          int d1 = currentGameType == 0 ? 4 : 3;
                          int d2 = currentGameType == 0 ? 7 : 6;
                          int d3 = currentGameType == 0 ? 11 : 9;
                          if (checkClick(ex, ey, space, row2Y, space + btnW, row2Y + btnH)) {
                              setDepth(d1); return true;
                          }
                          if (checkClick(ex, ey, space * 2f + btnW, row2Y,
                                  space * 2f + btnW * 2f, row2Y + btnH)) {
                              setDepth(d2); return true;
                          }
                          if (checkClick(ex, ey, space * 3f + btnW * 2f, row2Y,
                                  space * 3f + btnW * 3f, row2Y + btnH)) {
                              setDepth(d3); return true;
                          }
                          if (checkClick(ex, ey, space, row3Y, space + btnW, row3Y + btnH)) {
                              int depth = getDepth();
                              if (depth > 1) setDepth(depth - 1);
                              return true;
                          }
                          if (checkClick(ex, ey, w - space - btnW, row3Y,
                                  w - space, row3Y + btnH)) {
                              int depth = getDepth();
                              if (depth < getMaxDepth()) setDepth(depth + 1);
                              return true;
                          }
                      }

                      float switchBtnW = w * 0.5f;
                      float switchBtnH = w * 0.11f;
                      float switchBtnX = w / 2f - switchBtnW / 2f;
                      float switchBtnY = (mode == 0 ? row3Y : row1Y) + btnH + w * 0.06f;
                      if (checkClick(ex, ey, switchBtnX, switchBtnY,
                              switchBtnX + switchBtnW, switchBtnY + switchBtnH)) {
                          if (!g_aiThinking && !x_aiThinking) {
                              currentGameType = 1 - currentGameType;
                              updateStatusMsg();
                              invalidate();
                          }
                          return true;
                      }

                      if (currentGameType == 0 && !g_gameOver && !g_aiThinking) {
                          handleGomokuTouch(ex, ey);
                      } else if (currentGameType == 1 && !x_gameOver && !x_aiThinking) {
                          handleXiangqiTouch(ex, ey);
                      }
                      return true;
                  }

                  private boolean checkClick(float x, float y, float left, float top,
                                             float right, float bottom) {
                      return x >= left && x <= right && y >= top && y <= bottom;
                  }

                  private int getDepth() {
                      return currentGameType == 0 ? g_aiDepth : x_aiDepth;
                  }

                  private int getMaxDepth() {
                      return currentGameType == 0 ? G_MAX_USER_DEPTH : X_MAX_USER_DEPTH;
                  }

                  private void setDepth(int depth) {
                      if (currentGameType == 0) g_aiDepth = clamp(depth, 1, G_MAX_USER_DEPTH);
                      else x_aiDepth = clamp(depth, 1, X_MAX_USER_DEPTH);
                      updateStatusMsg();
                      invalidate();
                  }

                  private void handleGomokuTouch(float ex, float ey) {
                      if (g_gameMode != 1 && g_currentPlayer != g_humanColor) return;
                      int c = Math.round((ex - startX) / g_cellSize);
                      int r = Math.round((ey - startY) / g_cellSize);
                      if (!insideG(r, c) || g_board[r][c] != 0) return;
                      if (g_isForbiddenMove(g_board, r, c, g_currentPlayer)) {
                          g_statusMsg = "禁手违规！";
                          invalidate();
                          return;
                      }
                      int movedPlayer = g_currentPlayer;
                      g_makeMove(r, c, movedPlayer);
                      if (g_checkWin(g_board, r, c, movedPlayer)) {
                          g_statusMsg = (movedPlayer == 1 ? "黑" : "白") + "棋胜利！";
                          g_gameOver = true;
                      } else {
                          g_currentPlayer = 3 - g_currentPlayer;
                          updateStatusMsg();
                          if (g_gameMode == 0) triggerGomokuAiMove();
                      }
                      invalidate();
                  }

                  private void x_selectPiece(int r, int c) {
                      x_selectedPos = new int[]{r, c};
                      x_validMovesDisplay.clear();
                      int count = x_genValidMoves(x_board, r, c, x_pieceMoveScratch);
                      for (int i = 0; i < count; i++) {
                          int move = x_pieceMoveScratch[i];
                          if (x_isLegalMove(x_board, move, x_isRedTurn)) x_validMovesDisplay.add(move);
                      }
                  }

                  private void handleXiangqiTouch(float ex, float ey) {
                      if (x_gameMode != 1 && !x_isRedTurn) return;
                      int c = Math.round((ex - startX) / x_cellSize);
                      int r = Math.round((ey - startY) / x_cellSize);
                      if (!insideX(r, c)) return;

                      if (x_selectedPos != null) {
                          int sr = x_selectedPos[0], sc = x_selectedPos[1];
                          int selectedMove = encodeXMove(sr, sc, r, c);
                          boolean legalTarget = x_validMovesDisplay.contains(selectedMove);
                          if (legalTarget) {
                              x_makeMove(sr, sc, r, c);
                              if (x_checkGameOver(x_board, x_isRedTurn)) {
                                  boolean inCheck = x_isInCheck(x_board, x_isRedTurn);
                                  x_statusMsg = inCheck
                                          ? "绝杀！" + (x_isRedTurn ? "黑" : "红") + "方胜利！"
                                          : "困毙！" + (x_isRedTurn ? "黑" : "红") + "方胜利！(对方无棋可走)";
                                  x_gameOver = true;
                              } else {
                                  updateStatusMsg();
                                  if (x_gameMode == 0) triggerXiangqiAiMove();
                              }
                          } else if (x_board[r][c] != '.' && x_isRed(x_board[r][c]) == x_isRedTurn) {
                              x_selectPiece(r, c);
                          } else {
                              x_selectedPos = null;
                              x_validMovesDisplay.clear();
                          }
                      } else if (x_board[r][c] != '.' && x_isRed(x_board[r][c]) == x_isRedTurn) {
                          x_selectPiece(r, c);
                      }
                      invalidate();
                  }
              }
          }
