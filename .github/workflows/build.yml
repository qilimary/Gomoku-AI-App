                      backBtn.set(width * 0.015f, height * 0.025f, width * 0.105f, height * 0.105f);
                      drawButton(canvas, backBtn, "退出", 0xAA9D3F3F, Color.WHITE, height * 0.027f, false);
                      rulesBtn.set(width * 0.895f, height * 0.025f, width * 0.985f, height * 0.105f);
                      drawButton(canvas, rulesBtn, "说明", 0x884B6B62, Color.WHITE, height * 0.027f, false);
                  }

                  private void drawOpponents(Canvas canvas) {
                      float y = height * 0.19f;
                      drawOpponent(canvas, 1, width * 0.15f, y, false);
                      drawOpponent(canvas, 2, width * 0.85f, y, true);
                  }

                  private void drawOpponent(Canvas canvas, int player, float cx, float cy, boolean right) {
                      boolean isLandlord = landlord == player;
                      drawCenteredText(canvas, (isLandlord ? "★ " : "") + "AI " + player,
                              cx, cy - height * 0.065f, height * 0.033f,
                              isLandlord ? 0xFFFFD85A : Color.WHITE, true);
                      drawCenteredText(canvas, "剩 " + hands[player].size() + " 张",
                              cx, cy - height * 0.025f, height * 0.027f, 0xFFDDEFEA, false);
                      int show = Math.min(10, hands[player].size());
                      float smallW = cardW * 0.42f, smallH = cardH * 0.42f;
                      float spacing = smallW * 0.34f;
                      float start = cx - (show - 1) * spacing / 2f - smallW / 2f;
                      for (int i = 0; i < show; i++) drawCardBack(canvas, start + i * spacing, cy, smallW, smallH);
                      if (currentTurn == player && state == STATE_PLAYING) {
                          paint.setColor(0xFFFFD85A);
                          canvas.drawCircle(right ? cx + width * 0.085f : cx - width * 0.085f,
                                  cy + smallH * 0.45f, dp(6), paint);
                      }
                  }

                  private void drawBottomCards(Canvas canvas) {
                      float smallW = cardW * 0.56f, smallH = cardH * 0.56f;
                      float sx = width / 2f - (smallW * 3 + dp(12) * 2) / 2f;
                      for (int i = 0; i < bottomCards.size(); i++) {
                          Card c = bottomCards.get(i);
                          if (landlord < 0) drawCardBack(canvas, sx + i * (smallW + dp(12)), height * 0.12f, smallW, smallH);
                          else drawCard(canvas, c, sx + i * (smallW + dp(12)), height * 0.12f, smallW, smallH, false);
                      }
                  }

                  private void drawTableCards(Canvas canvas) {
                      if (tableCards.isEmpty()) return;
                      float w2 = cardW * 0.78f, h2 = cardH * 0.78f;
                      float spacing = Math.min(w2 * 0.42f, width * 0.31f / Math.max(1, tableCards.size()));
                      float total = w2 + spacing * (tableCards.size() - 1);
                      float sx = width / 2f - total / 2f;
                      float y = height * 0.31f;
                      for (int i = 0; i < tableCards.size(); i++) {
                          drawCard(canvas, tableCards.get(i), sx + i * spacing, y, w2, h2, false);
                      }
                      drawCenteredText(canvas, DoudizhuRules.typeName(tableCombo), width / 2f,
                              y + h2 + height * 0.037f, height * 0.027f, 0xFFFFE6A0, false);
                  }

                  private void drawHumanHand(Canvas canvas) {
                      humanCardRects.clear();
                      humanRectCards.clear();
                      ArrayList<Card> hand = hands[0];
                      hand.sort(CARD_COMPARATOR);
                      int n = hand.size();
                      if (n == 0) return;
                      float maxSpan = width * 0.73f;
                      float spacing = n <= 1 ? 0 : Math.min(cardW * 0.50f, (maxSpan - cardW) / (n - 1));
                      float total = cardW + spacing * (n - 1);
                      float sx = width / 2f - total / 2f;
                      handTop = height - cardH - height * 0.035f;
                      for (int i = 0; i < n; i++) {
                          Card card = hand.get(i);
                          float y = handTop - (card.selected ? height * 0.048f : 0f);
                          RectF rect = drawCard(canvas, card, sx + i * spacing, y, cardW, cardH,
                                  landlord == 0 && state == STATE_PLAYING && currentTurn == 0);
                          humanCardRects.add(rect);
                          humanRectCards.add(card);
                      }
                      if (landlord == 0) {
                          drawCenteredText(canvas, "★ 地主", width * 0.12f, handTop + cardH * 0.35f,
                                  height * 0.031f, 0xFFFFD85A, true);
                      }
                  }

                  private void drawActionButtons(Canvas canvas) {
                      float bw = width * 0.105f, bh = height * 0.072f, gap = width * 0.014f;
                      float y = height * 0.71f;
                      if (state == STATE_BIDDING && currentTurn == 0) {
                          float total = bw * 4 + gap * 3;
                          float sx = width / 2f - total / 2f;
                          String[] labels = {"不叫", "1分", "2分", "3分"};
                          int[] colors = {0xFF777777, 0xFF6FA8DC, 0xFFE7B64B, 0xFFE8664F};
                          for (int i = 0; i < 4; i++) {
                              bidBtns[i].set(sx + i * (bw + gap), y, sx + i * (bw + gap) + bw, y + bh);
                              boolean disabled = i > 0 && i <= highestBid;
                              drawButton(canvas, bidBtns[i], labels[i], disabled ? 0xFF666666 : colors[i],
                                      disabled ? 0xFFAAAAAA : Color.WHITE, height * 0.026f, false);
                          }
                          return;
                      }
                      if (state != STATE_PLAYING || currentTurn != 0) return;
                      float total = bw * 4 + gap * 3;
                      float sx = width / 2f - total / 2f;
                      passBtn.set(sx, y, sx + bw, y + bh);
                      hintBtn.set(sx + bw + gap, y, sx + bw * 2 + gap, y + bh);
                      playBtn.set(sx + (bw + gap) * 2, y, sx + bw * 3 + gap * 2, y + bh);
                      counterBtn.set(sx + (bw + gap) * 3, y, sx + bw * 4 + gap * 3, y + bh);
                      drawButton(canvas, passBtn, tableCombo == null ? "必须出" : "不出",
                              tableCombo == null ? 0xFF555555 : 0xFF777777, Color.WHITE, height * 0.026f, false);
                      drawButton(canvas, hintBtn, "提示", 0xFF6FA8DC, Color.WHITE, height * 0.026f, false);
                      drawButton(canvas, playBtn, "出牌", 0xFFFFC43D, 0xFF332300, height * 0.026f, false);
                      drawButton(canvas, counterBtn, showCounter ? "隐藏记牌" : "记牌器",
                              0xFF5C8F7A, Color.WHITE, height * 0.024f, false);
                  }

                  private void drawMessage(Canvas canvas) {
                      String text = aiThinking ? message + "（AI思考中）" : message;
                      drawCenteredText(canvas, text, width / 2f, height * 0.64f,
                              height * 0.031f, 0xFFFFF2C8, true);
                  }

                  private void drawCounter(Canvas canvas) {
                      int[] remain = new int[18];
                      Arrays.fill(remain, 4);
                      remain[16] = 1; remain[17] = 1;
                      for (Card c : playedCards) remain[c.rank]--;
                      for (Card c : hands[0]) remain[c.rank]--;
                      StringBuilder sb = new StringBuilder("记牌  ");
                      for (int r = 17; r >= 3; r--) {
                          if (r < 10) continue;
                          sb.append(rankText(r)).append('×').append(Math.max(0, remain[r])).append("  ");
                      }
                      RectF panel = new RectF(width * 0.015f, height * 0.88f,
                              width * 0.41f, height * 0.965f);
                      paint.setColor(0x7700130F);
                      canvas.drawRoundRect(panel, dp(10), dp(10), paint);
                      drawCenteredText(canvas, sb.toString(), panel.centerX(), panel.centerY(),
                              height * 0.022f, 0xFFA8F0C8, false);
                  }

                  private RectF drawCard(Canvas canvas, Card card, float x, float y, float cw, float ch, boolean glow) {
                      RectF shadow = new RectF(x + dp(4), y + dp(5), x + cw + dp(4), y + ch + dp(5));
                      paint.setColor(0x55000000);
                      canvas.drawRoundRect(shadow, dp(8), dp(8), paint);
                      RectF rect = new RectF(x, y, x + cw, y + ch);
                      paint.setColor(card.selected ? 0xFFFFF4C7 : 0xFFFAFAF7);
                      canvas.drawRoundRect(rect, dp(8), dp(8), paint);
                      stroke.setColor(glow ? 0xFFFFD85A : 0xFFB8B8B8);
                      stroke.setStrokeWidth(glow ? dp(3) : dp(1));
                      canvas.drawRoundRect(rect, dp(8), dp(8), stroke);

                      int color = (card.suit == 1 || card.suit == 3 || card.rank == 17)
                              ? 0xFFD62F2F : 0xFF202020;
                      String rank = rankText(card.rank);
                      String suit = suitText(card);
                      paint.setColor(color);
                      paint.setTextAlign(Paint.Align.LEFT);
                      paint.setTypeface(android.graphics.Typeface.DEFAULT_BOLD);
                      paint.setTextSize(cw * (rank.length() > 1 ? 0.27f : 0.35f));
                      canvas.drawText(rank, x + cw * 0.10f, y + ch * 0.26f, paint);
                      paint.setTypeface(android.graphics.Typeface.DEFAULT);
                      paint.setTextSize(cw * 0.30f);
                      canvas.drawText(suit, x + cw * 0.11f, y + ch * 0.48f, paint);
                      paint.setTextAlign(Paint.Align.CENTER);
                      paint.setTextSize(cw * (card.rank >= 16 ? 0.31f : 0.46f));
                      canvas.drawText(card.rank >= 16 ? rank : suit,
                              x + cw * 0.56f, y + ch * 0.70f, paint);
                      return rect;
                  }

                  private void drawCardBack(Canvas canvas, float x, float y, float cw, float ch) {
                      RectF rect = new RectF(x, y, x + cw, y + ch);
                      paint.setColor(0xFF194F8A);
                      canvas.drawRoundRect(rect, dp(6), dp(6), paint);
                      stroke.setColor(Color.WHITE);
                      stroke.setStrokeWidth(dp(1.5f));
                      canvas.drawRoundRect(rect, dp(6), dp(6), stroke);
                      RectF inner = new RectF(x + cw * 0.12f, y + ch * 0.10f,
                              x + cw * 0.88f, y + ch * 0.90f);
                      stroke.setColor(0xFF86BCEB);
                      canvas.drawRoundRect(inner, dp(4), dp(4), stroke);
                      paint.setColor(0xFF86BCEB);
                      Path diamond = new Path();
                      diamond.moveTo(x + cw * 0.5f, y + ch * 0.28f);
                      diamond.lineTo(x + cw * 0.72f, y + ch * 0.5f);
                      diamond.lineTo(x + cw * 0.5f, y + ch * 0.72f);
                      diamond.lineTo(x + cw * 0.28f, y + ch * 0.5f);
                      diamond.close();
                      canvas.drawPath(diamond, paint);
                  }

                  private void drawButton(Canvas canvas, RectF rect, String text, int bg, int fg,
                                          float size, boolean selected) {
                      paint.setColor(bg);
                      paint.setShadowLayer(dp(6), 0, dp(3), 0x55000000);
                      canvas.drawRoundRect(rect, dp(12), dp(12), paint);
                      paint.clearShadowLayer();
                      if (selected) {
                          stroke.setColor(0xFFFFF0A0);
                          stroke.setStrokeWidth(dp(4));
                          canvas.drawRoundRect(rect, dp(12), dp(12), stroke);
                      }
                      drawCenteredText(canvas, text, rect.centerX(), rect.centerY(), size, fg, true);
                  }

                  private void drawCenteredText(Canvas canvas, String text, float cx, float cy,
                                                float size, int color, boolean bold) {
                      paint.setColor(color);
                      paint.setTextSize(size);
                      paint.setTextAlign(Paint.Align.CENTER);
                      paint.setTypeface(android.graphics.Typeface.create("sans",
                              bold ? android.graphics.Typeface.BOLD : android.graphics.Typeface.NORMAL));
                      Paint.FontMetrics fm = paint.getFontMetrics();
                      canvas.drawText(text, cx, cy - (fm.ascent + fm.descent) / 2f, paint);
                  }

                  @Override
                  public boolean onTouchEvent(MotionEvent event) {
                      if (event.getAction() != MotionEvent.ACTION_DOWN) return true;
                      float x = event.getX(), y = event.getY();
                      if (state == STATE_MENU) return handleMenuTouch(x, y);
                      if (backBtn.contains(x, y)) {
                          confirmExit();
                          return true;
                      }
                      if (rulesBtn.contains(x, y)) {
                          showRules();
                          return true;
                      }
                      if (aiThinking) return true;

                      if (state == STATE_BIDDING && currentTurn == 0) {
                          for (int i = 0; i < 4; i++) {
                              if (bidBtns[i].contains(x, y)) {
                                  if (i > 0 && i <= highestBid) {
                                      message = "必须叫出比当前更高的分数";
                                      invalidate();
                                      return true;
                                  }
                                  handleBid(0, i);
                                  return true;
                              }
                          }
                      }
                      if (state == STATE_PLAYING && currentTurn == 0) {
                          for (int i = humanCardRects.size() - 1; i >= 0; i--) {
                              if (humanCardRects.get(i).contains(x, y)) {
                                  Card card = humanRectCards.get(i);
                                  card.selected = !card.selected;
                                  invalidate();
                                  return true;
                              }
                          }
                          if (counterBtn.contains(x, y)) {
                              showCounter = !showCounter;
                              invalidate();
                              return true;
                          }
                          if (hintBtn.contains(x, y)) {
                              applyHint();
                              return true;
                          }
                          if (passBtn.contains(x, y)) {
                              if (tableCombo == null) message = "你拥有牌权，必须出牌";
                              else passTurn(0);
                              invalidate();
                              return true;
                          }
                          if (playBtn.contains(x, y)) {
                              playSelected();
                              return true;
                          }
                      }
                      return true;
                  }

                  private boolean handleMenuTouch(float x, float y) {
                      if (backBtn.contains(x, y)) {
                          finish();
                          return true;
                      }
                      if (rulesBtn.contains(x, y)) {
                          showRules();
                          return true;
                      }
                      for (int i = 0; i < 4; i++) {
                          if (menuBtns[i].contains(x, y)) {
                              difficulty = i;
                              invalidate();
                              return true;
                          }
                      }
                      RectF start = new RectF(width * 0.36f, height * 0.62f,
                              width * 0.64f, height * 0.74f);
                      if (start.contains(x, y)) {
                          startNewGame();
                          return true;
                      }
                      return true;
                  }

                  private void startNewGame() {
                      aiToken.incrementAndGet();
                      for (ArrayList<Card> hand : hands) hand.clear();
                      bottomCards.clear(); tableCards.clear(); playedCards.clear();
                      ArrayList<Card> deck = AiEngine.fullDeck();
                      Collections.shuffle(deck, random);
                      for (int i = 0; i < 51; i++) hands[i % 3].add(deck.get(i));
                      bottomCards.addAll(deck.subList(51, 54));
                      for (ArrayList<Card> hand : hands) hand.sort(CARD_COMPARATOR);
                      landlord = -1;
                      firstBidder = random.nextInt(3);
                      currentTurn = firstBidder;
                      bidTurns = 0;
                      highestBid = 0;
                      highestBidder = -1;
                      lastPlayPlayer = -1;
                      passCount = 0;
                      tableCombo = null;
                      state = STATE_BIDDING;
                      message = playerName(currentTurn) + "开始叫分";
                      clearSelection();
                      invalidate();
                      maybeScheduleAi();
                  }

                  private void handleBid(int player, int bid) {
                      if (state != STATE_BIDDING || player != currentTurn) return;
                      bidTurns++;
                      if (bid > highestBid) {
                          highestBid = bid;
                          highestBidder = player;
                      }
                      message = playerName(player) + (bid == 0 ? "不叫" : "叫 " + bid + " 分");
                      if (bid == 3 || bidTurns >= 3) {
                          if (highestBidder < 0) {
                              message = "无人叫地主，重新发牌";
                              handler.postDelayed(this::startNewGame, 650L);
                              invalidate();
                              return;
                          }
                          landlord = highestBidder;
                          hands[landlord].addAll(bottomCards);
                          hands[landlord].sort(CARD_COMPARATOR);
                          currentTurn = landlord;
                          state = STATE_PLAYING;
                          message = playerName(landlord) + "成为地主，先出牌";
                          invalidate();
                          maybeScheduleAi();
                          return;
                      }
                      currentTurn = (currentTurn + 1) % 3;
                      invalidate();
                      maybeScheduleAi();
                  }

                  private void maybeScheduleAi() {
                      if ((state != STATE_BIDDING && state != STATE_PLAYING) || currentTurn == 0 || aiThinking) return;
                      int token = aiToken.incrementAndGet();
                      aiThinking = true;
                      message = playerName(currentTurn) + (state == STATE_BIDDING ? "正在叫分" : "正在思考");
                      invalidate();
                      handler.postDelayed(() -> {
                          if (token != aiToken.get() || currentTurn == 0) { aiThinking = false; return; }
                          final int acting = currentTurn;
                          if (state == STATE_BIDDING) {
                              executor.execute(() -> {
                                  int bid = ai.bid(new ArrayList<>(hands[acting]), highestBid, difficulty);
                                  handler.post(() -> {
                                      if (token != aiToken.get() || state != STATE_BIDDING || currentTurn != acting) return;
                                      aiThinking = false;
                                      handleBid(acting, bid);
                                  });
                              });
                          } else {
                              long deadline = System.nanoTime() + ai.budgetMillis(difficulty) * 1_000_000L;
                              ArrayList<Card> own = new ArrayList<>(hands[acting]);
                              ArrayList<Card> played = new ArrayList<>(playedCards);
                              int[] remains = {hands[0].size(), hands[1].size(), hands[2].size()};
                              Combo tableCopy = tableCombo == null ? null
                                      : new Combo(tableCombo.type, tableCombo.mainRank,
                                      tableCombo.cardCount, tableCombo.serialLength);
                              int last = lastPlayPlayer;
                              int ll = landlord;
                              executor.execute(() -> {
                                  Play play = ai.choosePlay(acting, own, tableCopy, last, ll,
                                          remains, played, difficulty, deadline);
                                  handler.post(() -> {
                                      if (token != aiToken.get() || state != STATE_PLAYING || currentTurn != acting) return;
                                      aiThinking = false;
                                      if (play == null) passTurn(acting);
                                      else playCards(acting, play.cards, play.combo);
                                  });
                              });
                          }
                      }, difficulty == AiEngine.EASY ? 280L : 430L);
                  }

                  private void playSelected() {
                      ArrayList<Card> selected = new ArrayList<>();
                      for (Card c : hands[0]) if (c.selected) selected.add(c);
                      if (selected.isEmpty()) {
                          message = "请先选择要出的牌";
                          invalidate();
                          return;
                      }
                      Combo combo = DoudizhuRules.parse(selected);
                      if (!combo.valid()) {
                          message = "牌型不符合斗地主规则";
                          invalidate();
                          return;
                      }
                      if (tableCombo != null && !DoudizhuRules.beats(combo, tableCombo)) {
                          message = "这手牌压不过桌面牌型";
                          invalidate();
                          return;
                      }
                      playCards(0, selected, combo);
                  }

                  private void playCards(int player, List<Card> cards, Combo combo) {
                      for (Card c : cards) {
                          for (int i = 0; i < hands[player].size(); i++) {
                              if (hands[player].get(i).id == c.id) {
                                  Card removed = hands[player].remove(i);
                                  removed.selected = false;
                                  break;
                              }
                          }
                      }
                      tableCards.clear();
                      tableCards.addAll(cards);
                      tableCards.sort(CARD_COMPARATOR);
                      tableCombo = combo;
                      lastPlayPlayer = player;
                      passCount = 0;
                      playedCards.addAll(cards);
                      comboShowText = DoudizhuRules.typeName(combo);
                      comboShowUntil = System.currentTimeMillis() + 1_100L;
                      message = playerName(player) + "出了" + comboShowText;
                      clearSelection();
                      if (hands[player].isEmpty()) {
                          state = STATE_GAME_OVER;
                          boolean humanWin = (player == 0) || (player != landlord && landlord != 0);
                          message = humanWin ? "恭喜，你赢了！" : "本局失败，再来一局吧";
                          aiToken.incrementAndGet();
                          invalidate();
                          handler.postDelayed(this::showGameOverDialog, 700L);
                          return;
                      }
                      currentTurn = (player + 1) % 3;
                      invalidate();
                      maybeScheduleAi();
                  }

                  private void passTurn(int player) {
                      if (tableCombo == null) return;
                      passCount++;
                      message = playerName(player) + "选择不出";
                      if (passCount >= 2) {
                          int leader = lastPlayPlayer;
                          tableCards.clear();
                          tableCombo = null;
                          passCount = 0;
                          currentTurn = leader;
                          message = playerName(leader) + "重新获得牌权";
                      } else {
                          currentTurn = (player + 1) % 3;
                      }
                      clearSelection();
                      invalidate();
                      maybeScheduleAi();
                  }

                  private void applyHint() {
                      Play hint = ai.chooseHint(hands[0], tableCombo);
                      if (hint == null) {
                          message = "没有可以压过的牌";
                          invalidate();
                          return;
                      }
                      clearSelection();
                      for (Card h : hint.cards) {
                          for (Card c : hands[0]) if (c.id == h.id) { c.selected = true; break; }
                      }
                      message = "提示：" + DoudizhuRules.typeName(hint.combo);
                      invalidate();
                  }

                  private void clearSelection() {
                      for (Card c : hands[0]) c.selected = false;
                  }

                  private void showRules() {
                      String text = "【基本规则】\n"
                              + "三人斗地主，共54张牌。地主20张，两个农民各17张；地主先出，依次压牌。两名农民任意一人先出完即农民获胜。\n\n"
                              + "【支持牌型】\n"
                              + "单张、对子、三张、三带一、三带二、顺子、连对、飞机、飞机带单、飞机带对、四带二、四带两对、炸弹、王炸。2和大小王不能进入顺子、连对或飞机主体。\n\n"
                              + "【四档AI】\n"
                              + "简单：快速基础决策；普通：牌型与剩余手数评估；困难：加入未知牌抽样和控牌判断；大师：扩大抽样、强化农民配合和残局封锁。\n"
                              + "最大思考时间约为0.35秒、0.85秒、1.9秒、3.6秒，达到上限会使用当前最优结果。\n\n"
                              + "【操作】\n"
                              + "点击手牌抬起/放下，点击出牌；提示可自动选牌；记牌器统计尚未出现在你视野中的高价值牌。游戏必须横屏。";
                      new AlertDialog.Builder(PokerActivity.this)
                              .setTitle("斗地主规则与AI说明")
                              .setMessage(text)
                              .setPositiveButton("知道了", null)
                              .show();
                  }

                  private void showGameOverDialog() {
                      if (isFinishing() || state != STATE_GAME_OVER) return;
                      new AlertDialog.Builder(PokerActivity.this)
                              .setTitle("本局结束")
                              .setMessage(message)
                              .setPositiveButton("再来一局", (d, w) -> startNewGame())
                              .setNegativeButton("返回菜单", (d, w) -> {
                                  state = STATE_MENU;
                                  message = "请选择难度开始游戏";
                                  invalidate();
                              })
                              .show();
                  }

                  private void confirmExit() {
                      new AlertDialog.Builder(PokerActivity.this)
                              .setTitle("退出斗地主")
                              .setMessage("当前牌局不会保存，确定返回棋类游戏吗？")
                              .setPositiveButton("确定", (d, w) -> finish())
                              .setNegativeButton("继续游戏", null)
                              .show();
                  }

                  private String playerName(int player) {
                      return player == 0 ? "你" : "AI " + player;
                  }

                  private String rankText(int rank) {
                      if (rank >= 3 && rank <= 10) return String.valueOf(rank);
                      if (rank == 11) return "J";
                      if (rank == 12) return "Q";
                      if (rank == 13) return "K";
                      if (rank == 14) return "A";
                      if (rank == 15) return "2";
                      if (rank == 16) return "小王";
                      return "大王";
                  }

                  private String suitText(Card card) {
                      if (card.rank >= 16) return card.rank == 17 ? "★" : "☆";
                      switch (card.suit) {
                          case 0: return "♠";
                          case 1: return "♥";
                          case 2: return "♣";
                          default: return "♦";
                      }
                  }

                  private float dp(float v) { return v * density; }
              }
          }

          JAVA_POKER

          # 斗地主源码完整性检查
          test -s app/src/main/java/com/gomoku/app/PokerActivity.java
          grep -q 'public class PokerActivity extends Activity' app/src/main/java/com/gomoku/app/PokerActivity.java
          grep -q 'static final int MASTER = 3' app/src/main/java/com/gomoku/app/PokerActivity.java
          grep -q 'SCREEN_ORIENTATION_SENSOR_LANDSCAPE' app/src/main/java/com/gomoku/app/PokerActivity.java
          grep -q 'android:name=".PokerActivity"' app/src/main/AndroidManifest.xml
          
          
          
          test -s app/src/main/java/com/gomoku/app/MainActivity.java
          grep -q '^package com\.gomoku\.app;' app/src/main/java/com/gomoku/app/MainActivity.java
          grep -q 'public class MainActivity extends Activity' app/src/main/java/com/gomoku/app/MainActivity.java
          grep -q 'G_MAX_USER_DEPTH = 15' app/src/main/java/com/gomoku/app/MainActivity.java
          grep -q 'X_MAX_USER_DEPTH = 12' app/src/main/java/com/gomoku/app/MainActivity.java

