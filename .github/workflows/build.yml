                  static Combo parse(List<Card> cards) {
                      if (cards == null || cards.isEmpty()) return new Combo(Combo.INVALID, 0, 0, 0);
                      int n = cards.size();
                      int[] counts = new int[18];
                      int min = 18, max = 0, distinct = 0;
                      for (Card card : cards) {
                          if (counts[card.rank]++ == 0) distinct++;
                          min = Math.min(min, card.rank);
                          max = Math.max(max, card.rank);
                      }

                      if (n == 2 && counts[16] == 1 && counts[17] == 1) {
                          return new Combo(Combo.ROCKET, 17, 2, 1);
                      }
                      if (n == 1) return new Combo(Combo.SINGLE, max, 1, 1);
                      if (n == 2 && distinct == 1) return new Combo(Combo.PAIR, max, 2, 1);
                      if (n == 3 && distinct == 1) return new Combo(Combo.TRIO, max, 3, 1);
                      if (n == 4 && distinct == 1) return new Combo(Combo.BOMB, max, 4, 1);

                      int trioRank = -1, pairRank = -1, fourRank = -1;
                      for (int r = 3; r <= 17; r++) {
                          if (counts[r] == 4) fourRank = r;
                          if (counts[r] == 3) trioRank = r;
                          if (counts[r] == 2) pairRank = r;
                      }
                      if (n == 4 && trioRank >= 0) return new Combo(Combo.TRIO_SINGLE, trioRank, 4, 1);
                      if (n == 5 && trioRank >= 0 && pairRank >= 0) {
                          return new Combo(Combo.TRIO_PAIR, trioRank, 5, 1);
                      }
                      if (n == 6 && fourRank >= 0) {
                          return new Combo(Combo.FOUR_TWO_SINGLE, fourRank, 6, 1);
                      }
                      if (n == 8 && fourRank >= 0) {
                          int pairs = 0;
                          for (int r = 3; r <= 17; r++) if (r != fourRank && counts[r] == 2) pairs++;
                          if (pairs == 2) return new Combo(Combo.FOUR_TWO_PAIR, fourRank, 8, 1);
                      }

                      if (n >= 5 && max < 15 && distinct == n && max - min + 1 == n) {
                          return new Combo(Combo.STRAIGHT, max, n, n);
                      }
                      if (n >= 6 && n % 2 == 0 && max < 15 && distinct == n / 2 && max - min + 1 == n / 2) {
                          boolean allPairs = true;
                          for (int r = min; r <= max; r++) if (counts[r] != 2) { allPairs = false; break; }
                          if (allPairs) return new Combo(Combo.PAIR_STRAIGHT, max, n, n / 2);
                      }

                      Combo plane = parseAirplane(counts, n);
                      return plane != null ? plane : new Combo(Combo.INVALID, 0, n, 0);
                  }

                  private static Combo parseAirplane(int[] counts, int n) {
                      for (int start = 3; start <= 14; start++) {
                          for (int end = start + 1; end <= 14; end++) {
                              int k = end - start + 1;
                              boolean body = true;
                              for (int r = start; r <= end; r++) {
                                  if (counts[r] < 3) { body = false; break; }
                              }
                              if (!body) continue;

                              int remain = n - k * 3;
                              if (remain == 0) {
                                  boolean exact = true;
                                  for (int r = 3; r <= 17; r++) {
                                      int left = counts[r] - (r >= start && r <= end ? 3 : 0);
                                      if (left != 0) { exact = false; break; }
                                  }
                                  if (exact) return new Combo(Combo.AIRPLANE, end, n, k);
                              } else if (remain == k) {
                                  int leftCards = 0;
                                  boolean ok = true;
                                  for (int r = 3; r <= 17; r++) {
                                      int left = counts[r] - (r >= start && r <= end ? 3 : 0);
                                      if (left < 0 || (r >= start && r <= end && left != 0)) {
                                          ok = false;
                                          break;
                                      }
                                      leftCards += left;
                                  }
                                  if (ok && leftCards == k) {
                                      return new Combo(Combo.AIRPLANE_SINGLE, end, n, k);
                                  }
                              } else if (remain == k * 2) {
                                  int pairCount = 0;
                                  boolean ok = true;
                                  for (int r = 3; r <= 17; r++) {
                                      int left = counts[r] - (r >= start && r <= end ? 3 : 0);
                                      if (r >= start && r <= end && left != 0) { ok = false; break; }
                                      if (left == 0) continue;
                                      if (left != 2) { ok = false; break; }
                                      pairCount++;
                                  }
                                  if (ok && pairCount == k) {
                                      return new Combo(Combo.AIRPLANE_PAIR, end, n, k);
                                  }
                              }
                          }
                      }
                      return null;
                  }

                  static boolean beats(Combo play, Combo table) {
                      if (play == null || table == null || !play.valid()) return false;
                      if (play.type == Combo.ROCKET) return table.type != Combo.ROCKET;
                      if (table.type == Combo.ROCKET) return false;
                      if (play.type == Combo.BOMB) {
                          return table.type != Combo.BOMB || play.mainRank > table.mainRank;
                      }
                      if (table.type == Combo.BOMB) return false;
                      return play.type == table.type
                              && play.cardCount == table.cardCount
                              && play.serialLength == table.serialLength
                              && play.mainRank > table.mainRank;
                  }

