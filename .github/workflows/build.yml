name: Build Android APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Auto Generate Android Configs
        run: |
          # 自动生成顶级 build.gradle
          cat << 'EOF' > build.gradle
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.2.2'
              }
          }
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          EOF
          
          # 自动生成 settings.gradle
          echo "include ':app'" > settings.gradle
          
          # 自动生成 app/build.gradle
          mkdir -p app
          cat << 'EOF' > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.gomoku.app'
              compileSdk 34
              defaultConfig {
                  applicationId "com.gomoku.app"
                  minSdk 26
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
          }
          EOF
          
          # 生成应用精美图标 (修复了 Vector Drawable 无法直接使用 circle 的问题)
          mkdir -p app/src/main/res/drawable
          cat << 'EOF' > app/src/main/res/drawable/ic_launcher.xml
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="108dp" android:height="108dp" android:viewportWidth="108" android:viewportHeight="108">
              <path android:fillColor="#E3C498" android:pathData="M10,10 h88 v88 h-88 z" />
              <path android:strokeColor="#000000" android:strokeWidth="1.5" android:pathData="M20,20 h68 M20,33.6 h68 M20,47.2 h68 M20,60.8 h68 M20,74.4 h68 M20,88 h68 M20,20 v68 M33.6,20 v68 M47.2,20 v68 M60.8,20 v68 M74.4,20 v68 M88,20 v68" />
              <!-- 使用贝塞尔曲线 path 完美绘制黑白棋子 -->
              <path android:fillColor="#000000" android:pathData="M42.7,47.2 a4.5,4.5 0 1,0 9,0 a4.5,4.5 0 1,0 -9,0" />
              <path android:fillColor="#FFFFFF" android:pathData="M56.3,60.8 a4.5,4.5 0 1,0 9,0 a4.5,4.5 0 1,0 -9,0" />
          </vector>
          EOF
          
          # 自动生成 AndroidManifest.xml，挂载图标和新名字
          mkdir -p app/src/main
          cat << 'EOF' > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="五子棋" android:icon="@drawable/ic_launcher" android:theme="@android:style/Theme.DeviceDefault.Light.NoActionBar">
                  <activity android:name="com.gomoku.app.MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Setup Gradle Wrapper
        run: gradle wrapper --gradle-version 8.5

      - name: Build APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Gomoku-AI-APK
          path: app/build/outputs/apk/debug/*.apk
