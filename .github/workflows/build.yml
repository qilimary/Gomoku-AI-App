                  private static void generateStraights(ArrayList<Play> out, Set<String> seen, int[] counts,
                                                        ArrayList<Card>[] byRank, int copies,
                                                        int minLen, int maxLen, int minMainExclusive, int limit) {
                      for (int start = 3; start <= 14; start++) {
                          for (int len = minLen; len <= maxLen && start + len - 1 <= 14; len++) {
                              int end = start + len - 1;
                              if (end <= minMainExclusive) continue;
                              boolean ok = true;
                              for (int r = start; r <= end; r++) if (counts[r] < copies) { ok = false; break; }
                              if (!ok) continue;
                              ArrayList<Card> p = new ArrayList<>();
                              for (int r = start; r <= end; r++) p.addAll(byRank[r].subList(0, copies));
                              add(out, seen, p, limit);
                          }
                      }
                  }

                  private static void generateAirplanes(ArrayList<Play> out, Set<String> seen, int[] counts,
                                                        ArrayList<Card>[] byRank, int requiredType,
                                                        int minMainExclusive, int limit) {
                      for (int start = 3; start <= 13; start++) {
                          for (int end = start + 1; end <= 14; end++) {
                              int k = end - start + 1;
                              if (end <= minMainExclusive) continue;
                              boolean ok = true;
                              for (int r = start; r <= end; r++) if (counts[r] < 3) { ok = false; break; }
                              if (!ok) continue;
                              ArrayList<Card> body = new ArrayList<>();
                              for (int r = start; r <= end; r++) body.addAll(byRank[r].subList(0, 3));
                              if (requiredType == -1 || requiredType == Combo.AIRPLANE) add(out, seen, body, limit);

                              ArrayList<Card> loose = new ArrayList<>();
                              ArrayList<Integer> pairRanks = new ArrayList<>();
                              for (int r = 3; r <= 17; r++) {
                                  if (r >= start && r <= end) continue; // 翅膀不得取自飞机主体牌点
                                  int left = counts[r];
                                  for (int i = 0; i < left; i++) loose.add(byRank[r].get(i));
                                  if (left >= 2 && r <= 15) pairRanks.add(r);
                              }
                              loose.sort(CARD_COMPARATOR);
                              if ((requiredType == -1 || requiredType == Combo.AIRPLANE_SINGLE) && loose.size() >= k) {
                                  addWingVariants(out, seen, body, loose, k, limit);
                              }
                              if ((requiredType == -1 || requiredType == Combo.AIRPLANE_PAIR) && pairRanks.size() >= k) {
                                  choosePairWings(out, seen, body, byRank, counts, start, end,
                                          pairRanks, 0, k, new ArrayList<>(), limit);
                              }
                          }
                      }
                  }

                  private static void addWingVariants(ArrayList<Play> out, Set<String> seen, ArrayList<Card> body,
                                                      ArrayList<Card> loose, int k, int limit) {
                      ArrayList<Card> low = new ArrayList<>(body);
                      low.addAll(loose.subList(0, k));
                      add(out, seen, low, limit);

                      ArrayList<Card> high = new ArrayList<>(body);
                      high.addAll(loose.subList(loose.size() - k, loose.size()));
                      add(out, seen, high, limit);

                      ArrayList<Card> preservePairs = new ArrayList<>();
                      int[] local = new int[18];
                      for (Card c : loose) local[c.rank]++;
                      for (Card c : loose) if (local[c.rank] == 1) preservePairs.add(c);
                      for (Card c : loose) if (!preservePairs.contains(c)) preservePairs.add(c);
                      if (preservePairs.size() >= k) {
                          ArrayList<Card> p = new ArrayList<>(body);
                          p.addAll(preservePairs.subList(0, k));
                          add(out, seen, p, limit);
                      }
                  }

                  private static void choosePairWings(ArrayList<Play> out, Set<String> seen, ArrayList<Card> body,
                                                      ArrayList<Card>[] byRank, int[] counts, int planeStart, int planeEnd,
                                                      ArrayList<Integer> ranks, int index, int need,
                                                      ArrayList<Integer> chosen, int limit) {
                      if (out.size() >= limit) return;
                      if (chosen.size() == need) {
                          ArrayList<Card> p = new ArrayList<>(body);
                          for (int rank : chosen) {
                              int used = rank >= planeStart && rank <= planeEnd ? 3 : 0;
                              p.add(byRank[rank].get(used));
                              p.add(byRank[rank].get(used + 1));
                          }
                          add(out, seen, p, limit);
                          return;
                      }
                      for (int i = index; i <= ranks.size() - (need - chosen.size()); i++) {
                          chosen.add(ranks.get(i));
                          choosePairWings(out, seen, body, byRank, counts, planeStart, planeEnd,
                                  ranks, i + 1, need, chosen, limit);
                          chosen.remove(chosen.size() - 1);
                      }
                  }

                  private static void generateFourWith(ArrayList<Play> out, Set<String> seen, int[] counts,
                                                       ArrayList<Card>[] byRank, int requiredType, int limit) {
                      for (int four = 3; four <= 15; four++) {
                          if (counts[four] != 4) continue;
                          ArrayList<Card> rest = new ArrayList<>();
                          ArrayList<Integer> pairRanks = new ArrayList<>();
                          for (int r = 3; r <= 17; r++) if (r != four) {
                              rest.addAll(byRank[r]);
                              if (r <= 15 && counts[r] >= 2) pairRanks.add(r);
                          }
                          rest.sort(CARD_COMPARATOR);
                          if ((requiredType == -1 || requiredType == Combo.FOUR_TWO_SINGLE) && rest.size() >= 2) {
                              for (int i = 0; i < rest.size(); i++) {
                                  for (int j = i + 1; j < rest.size(); j++) {
                                      ArrayList<Card> p = take(byRank, four, 4);
                                      p.add(rest.get(i)); p.add(rest.get(j));
                                      add(out, seen, p, limit);
                                      if (out.size() >= limit) return;
                                  }
                              }
                          }
                          if ((requiredType == -1 || requiredType == Combo.FOUR_TWO_PAIR) && pairRanks.size() >= 2) {
                              for (int i = 0; i < pairRanks.size(); i++) {
                                  for (int j = i + 1; j < pairRanks.size(); j++) {
                                      ArrayList<Card> p = take(byRank, four, 4);
                                      p.addAll(byRank[pairRanks.get(i)].subList(0, 2));
                                      p.addAll(byRank[pairRanks.get(j)].subList(0, 2));
                                      add(out, seen, p, limit);
                                  }
                              }
                          }
                      }
                  }

                  private static ArrayList<Card> take(ArrayList<Card>[] byRank, int rank, int amount) {
                      return new ArrayList<>(byRank[rank].subList(0, amount));
                  }

                  private static void add(ArrayList<Play> out, Set<String> seen, List<Card> cards, int limit) {
                      if (out.size() >= limit || cards == null || cards.isEmpty()) return;
                      ArrayList<Card> copy = new ArrayList<>(cards);
                      copy.sort(CARD_COMPARATOR);
                      Combo combo = parse(copy);
                      if (!combo.valid()) return;
                      StringBuilder key = new StringBuilder();
                      key.append(combo.type).append(':');
                      for (Card c : copy) key.append(c.rank).append(',');
                      if (!seen.add(key.toString())) return;
                      out.add(new Play(copy, combo));
                  }
              }

              static final class AiEngine {
                  static final int EASY = 0;
                  static final int NORMAL = 1;
                  static final int HARD = 2;
                  static final int MASTER = 3;

                  private final Random random = new Random();

                  long budgetMillis(int difficulty) {
                      switch (difficulty) {
                          case EASY: return 350L;
                          case NORMAL: return 850L;
                          case HARD: return 1_900L;
                          default: return 3_600L;
                      }
                  }

                  int bid(List<Card> hand, int currentBid, int difficulty) {
                      int[] counts = countRanks(hand);
                      double score = 0.0;
                      for (int r = 3; r <= 15; r++) {
                          if (counts[r] == 4) score += 3.4;
                          if (counts[r] == 3) score += r >= 12 ? 1.2 : 0.5;
                      }
                      if (counts[17] == 1) score += 3.0;
                      if (counts[16] == 1) score += 2.1;
                      score += counts[15] * 1.25 + counts[14] * 0.55;
                      int turns = estimateTurns(hand);
                      score += Math.max(0, 9 - turns) * 0.45;
                      if (difficulty == EASY) score += random.nextDouble() * 2.0 - 1.0;
                      int target = score >= 7.3 ? 3 : score >= 4.5 ? 2 : score >= 2.4 ? 1 : 0;
                      return target > currentBid ? target : 0;
                  }

                  Play choosePlay(int player, List<Card> hand, Combo table, int lastPlayer,
                                  int landlord, int[] remainingCounts, List<Card> played,
                                  int difficulty, long deadlineNanos) {
                      ArrayList<Play> legal = DoudizhuRules.generateLegalPlays(hand, table,
                              difficulty >= HARD ? 520 : 260);
                      if (legal.isEmpty()) return null;

                      boolean teammateLed = player != landlord && lastPlayer >= 0
                              && lastPlayer != landlord && lastPlayer != player;
                      int enemy = player == landlord ? nextOpponentWithFewest(player, remainingCounts)
                              : landlord;
                      int enemyRemain = remainingCounts[enemy];

                      if (difficulty == EASY) {
                          legal.sort(Comparator.comparingInt(a -> a.combo.mainRank));
                          int range = Math.min(3, legal.size());
                          return legal.get(random.nextInt(range));
                      }

                      int sampleCount = difficulty == MASTER ? 68 : difficulty == HARD ? 28 : 0;
                      Map<String, Double> beatProbability = sampleCount > 0
                              ? estimateBeatProbabilities(player, hand, legal, remainingCounts, played,
                              sampleCount, deadlineNanos)
                              : Collections.emptyMap();

                      Play best = null;
                      int bestScore = Integer.MIN_VALUE;
                      for (Play play : legal) {
                          if (System.nanoTime() >= deadlineNanos) break;
                          ArrayList<Card> remain = new ArrayList<>(hand);
                          removeCards(remain, play.cards);
                          int turns = estimateTurns(remain);
                          int score = -turns * 180 + play.cards.size() * 7;
                          if (remain.isEmpty()) score += 1_000_000;

                          int controlCost = controlCost(play);
                          score -= controlCost;
                          if (play.combo.type == Combo.BOMB) score -= 250;
                          if (play.combo.type == Combo.ROCKET) score -= 420;

                          if (table != null) {
                              score -= play.combo.mainRank * 3;
                              if (enemyRemain <= 2 && !teammateLed) score += play.combo.mainRank * 18;
                          } else {
                              if (play.combo.type == Combo.STRAIGHT || play.combo.type == Combo.PAIR_STRAIGHT
                                      || play.combo.type == Combo.AIRPLANE || play.combo.type == Combo.AIRPLANE_SINGLE
                                      || play.combo.type == Combo.AIRPLANE_PAIR) score += 70;
                          }

                          if (teammateLed) {
                              score -= 180;
                              if (remainingCounts[lastPlayer] <= 2) score -= 500;
                              if (play.cards.size() == hand.size()) score += 1_000_000;
                          }

                          if (!beatProbability.isEmpty()) {
                              double probability = beatProbability.getOrDefault(signature(play), 0.5);
                              if (player == landlord || !teammateLed) {
                                  score += (int) ((1.0 - probability) * 180.0);
                              } else {
                                  score -= (int) ((1.0 - probability) * 130.0);
                              }
                          }

                          if (difficulty == NORMAL) score += random.nextInt(15);
                          play.score = score;
                          if (score > bestScore) { bestScore = score; best = play; }
                      }

                      if (teammateLed && best != null && table != null && !best.cards.isEmpty()) {
                          if (remainingCounts[lastPlayer] <= 3 && best.cards.size() < hand.size()) return null;
                          if (best.combo.mainRank >= 14 && enemyRemain > 2 && best.cards.size() < hand.size()) return null;
                      }
                      return best != null ? best : legal.get(0);
                  }

                  Play chooseHint(List<Card> hand, Combo table) {
                      ArrayList<Play> legal = DoudizhuRules.generateLegalPlays(hand, table, 320);
                      if (legal.isEmpty()) return null;
                      Play best = null;
                      int bestScore = Integer.MIN_VALUE;
                      for (Play p : legal) {
                          ArrayList<Card> remain = new ArrayList<>(hand);
                          removeCards(remain, p.cards);
                          int score = -estimateTurns(remain) * 150 - p.combo.mainRank * 2 + p.cards.size() * 6;
                          if (remain.isEmpty()) score += 999_999;
                          if (p.combo.type == Combo.BOMB || p.combo.type == Combo.ROCKET) score -= 250;
                          if (score > bestScore) { bestScore = score; best = p; }
                      }
                      return best;
                  }

                  private Map<String, Double> estimateBeatProbabilities(int player, List<Card> hand,
                                                                         List<Play> plays, int[] remainingCounts,
                                                                         List<Card> played, int samples,
                                                                         long deadlineNanos) {
                      HashMap<String, Integer> beat = new HashMap<>();
                      HashMap<String, Integer> total = new HashMap<>();
                      ArrayList<Card> unknown = fullDeck();
                      removeCardsById(unknown, hand);
                      removeCardsById(unknown, played);
                      int leftId = (player + 1) % 3;
                      int rightId = (player + 2) % 3;
                      int leftCount = remainingCounts[leftId];
                      int rightCount = remainingCounts[rightId];
                      int possible = Math.min(unknown.size(), leftCount + rightCount);
                      if (possible <= 0) return Collections.emptyMap();

                      for (int s = 0; s < samples && System.nanoTime() < deadlineNanos; s++) {
                          Collections.shuffle(unknown, random);
                          ArrayList<Card> left = new ArrayList<>(unknown.subList(0, Math.min(leftCount, unknown.size())));
                          int from = Math.min(leftCount, unknown.size());
                          int to = Math.min(from + rightCount, unknown.size());
                          ArrayList<Card> right = new ArrayList<>(unknown.subList(from, to));
                          for (Play p : plays) {
                              String key = signature(p);
                              boolean can = canBeat(left, p.combo) || canBeat(right, p.combo);
                              total.put(key, total.getOrDefault(key, 0) + 1);
                              if (can) beat.put(key, beat.getOrDefault(key, 0) + 1);
                          }
                      }
                      HashMap<String, Double> result = new HashMap<>();
                      for (Map.Entry<String, Integer> e : total.entrySet()) {
                          int t = e.getValue();
                          result.put(e.getKey(), t == 0 ? 0.5 : beat.getOrDefault(e.getKey(), 0) / (double) t);
                      }
                      return result;
                  }


                  private boolean canBeat(List<Card> hand, Combo table) {
                      int[] counts = countRanks(hand);
                      if (counts[16] > 0 && counts[17] > 0 && table.type != Combo.ROCKET) return true;
                      if (table.type != Combo.ROCKET) {
                          int bombStart = table.type == Combo.BOMB ? table.mainRank + 1 : 3;
                          for (int r = bombStart; r <= 15; r++) if (counts[r] == 4) return true;
                      }
                      switch (table.type) {
                          case Combo.SINGLE:
                              for (int r = table.mainRank + 1; r <= 17; r++) if (counts[r] > 0) return true;
                              return false;
                          case Combo.PAIR:
                              for (int r = table.mainRank + 1; r <= 15; r++) if (counts[r] >= 2) return true;
                              return false;
                          case Combo.TRIO:
                              for (int r = table.mainRank + 1; r <= 15; r++) if (counts[r] >= 3) return true;
                              return false;
                          case Combo.TRIO_SINGLE:
                              for (int r = table.mainRank + 1; r <= 15; r++) if (counts[r] >= 3) {
                                  int other = hand.size() - counts[r];
                                  if (other >= 1) return true;
                              }
                              return false;
                          case Combo.TRIO_PAIR:
                              for (int r = table.mainRank + 1; r <= 15; r++) if (counts[r] >= 3) {
                                  for (int k = 3; k <= 15; k++) if (k != r && counts[k] >= 2) return true;
                              }
                              return false;
                          case Combo.STRAIGHT:
                              return hasSerial(counts, 1, table.serialLength, table.mainRank);
                          case Combo.PAIR_STRAIGHT:
                              return hasSerial(counts, 2, table.serialLength, table.mainRank);
                          case Combo.AIRPLANE:
                          case Combo.AIRPLANE_SINGLE:
                          case Combo.AIRPLANE_PAIR:
                              for (int end = table.mainRank + 1; end <= 14; end++) {
                                  int start = end - table.serialLength + 1;
                                  if (start < 3) continue;
                                  boolean body = true;
                                  for (int r = start; r <= end; r++) if (counts[r] < 3) { body = false; break; }
                                  if (!body) continue;
                                  if (table.type == Combo.AIRPLANE) return true;
                                  if (table.type == Combo.AIRPLANE_SINGLE) {
                                      int wings = 0;
                                      for (int r = 3; r <= 17; r++) if (r < start || r > end) wings += counts[r];
                                      if (wings >= table.serialLength) return true;
                                  } else {
                                      int pairs = 0;
                                      for (int r = 3; r <= 15; r++) if ((r < start || r > end) && counts[r] >= 2) pairs++;
                                      if (pairs >= table.serialLength) return true;
                                  }
                              }
                              return false;
                          case Combo.FOUR_TWO_SINGLE:
                              for (int r = table.mainRank + 1; r <= 15; r++) if (counts[r] == 4 && hand.size() - 4 >= 2) return true;
                              return false;
                          case Combo.FOUR_TWO_PAIR:
                              for (int r = table.mainRank + 1; r <= 15; r++) if (counts[r] == 4) {
                                  int pairs = 0;
                                  for (int k = 3; k <= 15; k++) if (k != r && counts[k] >= 2) pairs++;
                                  if (pairs >= 2) return true;
                              }
                              return false;
                          case Combo.BOMB:
                          case Combo.ROCKET:
                          default:
                              return false;
                      }
                  }

                  private boolean hasSerial(int[] counts, int copies, int length, int minMainExclusive) {
                      for (int end = minMainExclusive + 1; end <= 14; end++) {
                          int start = end - length + 1;
                          if (start < 3) continue;
                          boolean ok = true;
                          for (int r = start; r <= end; r++) if (counts[r] < copies) { ok = false; break; }
                          if (ok) return true;
                      }
                      return false;
                  }

                  private int estimateTurns(List<Card> cards) {
                      if (cards.isEmpty()) return 0;
                      int[] counts = countRanks(cards);
                      int best = greedyTurns(counts, true);
                      best = Math.min(best, greedyTurns(counts, false));
                      return best;
                  }

                  private int greedyTurns(int[] original, boolean preferSequences) {
                      int[] c = original.clone();
                      int turns = 0;
                      if (c[16] > 0 && c[17] > 0) { c[16]--; c[17]--; turns++; }
                      if (preferSequences) {
                          turns += removeAirplanes(c);
                          turns += removePairStraights(c);
                          turns += removeStraights(c);
                      }
                      for (int r = 3; r <= 15; r++) if (c[r] == 4) { c[r] = 0; turns++; }
                      turns += removeAirplanes(c);
                      if (!preferSequences) {
                          turns += removePairStraights(c);
                          turns += removeStraights(c);
                      }
                      for (int r = 3; r <= 17; r++) {
                          if (c[r] >= 3) { c[r] -= 3; turns++; }
                      }
                      int singles = 0, pairs = 0;
                      for (int r = 3; r <= 17; r++) {
                          pairs += c[r] / 2;
                          singles += c[r] % 2;
                      }
                      turns += pairs + singles;
                      return Math.max(1, turns);
                  }

                  private int removeStraights(int[] c) {
                      int turns = 0;
                      boolean changed;
                      do {
                          changed = false;
                          int bestStart = -1, bestLen = 0;
                          for (int start = 3; start <= 10; start++) {
                              int len = 0;
                              while (start + len <= 14 && c[start + len] > 0) len++;
                              if (len >= 5 && len > bestLen) { bestStart = start; bestLen = len; }
                          }
                          if (bestStart >= 0) {
                              for (int r = bestStart; r < bestStart + bestLen; r++) c[r]--;
                              turns++; changed = true;
                          }
                      } while (changed);
                      return turns;
                  }

                  private int removePairStraights(int[] c) {
                      int turns = 0;
                      boolean changed;
                      do {
                          changed = false;
                          int bestStart = -1, bestLen = 0;
                          for (int start = 3; start <= 12; start++) {
                              int len = 0;
                              while (start + len <= 14 && c[start + len] >= 2) len++;
                              if (len >= 3 && len > bestLen) { bestStart = start; bestLen = len; }
                          }
                          if (bestStart >= 0) {
                              for (int r = bestStart; r < bestStart + bestLen; r++) c[r] -= 2;
                              turns++; changed = true;
                          }
                      } while (changed);
                      return turns;
                  }

                  private int removeAirplanes(int[] c) {
                      int turns = 0;
                      boolean changed;
                      do {
                          changed = false;
                          int bestStart = -1, bestLen = 0;
                          for (int start = 3; start <= 13; start++) {
                              int len = 0;
                              while (start + len <= 14 && c[start + len] >= 3) len++;
                              if (len >= 2 && len > bestLen) { bestStart = start; bestLen = len; }
                          }
                          if (bestStart >= 0) {
                              for (int r = bestStart; r < bestStart + bestLen; r++) c[r] -= 3;
                              turns++; changed = true;
                          }
                      } while (changed);
                      return turns;
                  }

                  private int controlCost(Play play) {
                      int cost = play.combo.mainRank * 2;
                      if (play.combo.mainRank >= 15) cost += 45;
                      if (play.combo.type == Combo.BOMB) cost += 120;
                      if (play.combo.type == Combo.ROCKET) cost += 200;
                      return cost;
                  }

                  private int nextOpponentWithFewest(int player, int[] remains) {
                      int a = (player + 1) % 3, b = (player + 2) % 3;
                      return remains[a] <= remains[b] ? a : b;
                  }

                  private static int[] countRanks(List<Card> cards) {
                      int[] counts = new int[18];
                      for (Card c : cards) counts[c.rank]++;
                      return counts;
                  }

                  private static String signature(Play p) {
                      StringBuilder sb = new StringBuilder();
                      sb.append(p.combo.type).append(':').append(p.combo.mainRank).append(':');
                      for (Card c : p.cards) sb.append(c.rank).append(',');
                      return sb.toString();
                  }

                  private static ArrayList<Card> fullDeck() {
                      ArrayList<Card> deck = new ArrayList<>(54);
                      int id = 0;
                      for (int rank = 3; rank <= 15; rank++) {
                          for (int suit = 0; suit < 4; suit++) deck.add(new Card(id++, rank, suit));
                      }
                      deck.add(new Card(id++, 16, 4));
                      deck.add(new Card(id, 17, 5));
                      return deck;
                  }

                  private static void removeCards(List<Card> target, List<Card> cards) {
                      for (Card c : cards) {
                          for (int i = 0; i < target.size(); i++) {
                              if (target.get(i).id == c.id) { target.remove(i); break; }
                          }
                      }
                  }

                  private static void removeCardsById(List<Card> target, List<Card> cards) {
                      removeCards(target, cards);
                  }
              }

