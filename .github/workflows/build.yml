                          if (a.combo.cardCount != b.combo.cardCount) return Integer.compare(b.combo.cardCount, a.combo.cardCount);
                          return Integer.compare(a.combo.mainRank, b.combo.mainRank);
                      });
                      if (result.size() > limit) return new ArrayList<>(result.subList(0, limit));
                      return result;
                  }

