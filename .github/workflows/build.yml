name: Build Android APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Initialize Android Project
        run: |
          mkdir -p app/src/main/java/com/gomoku/app
          mkdir -p app/src/main/res/values
          
          # 创建 build.gradle
          cat << 'EOF' > build.gradle
          buildscript {
              repositories { google() \n maven { url "https://maven.aliyun.com/repository/public" } \n mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
          }
          allprojects {
              repositories { google() \n maven { url "https://maven.aliyun.com/repository/public" } \n mavenCentral() }
          }
          EOF

          # 创建 app/build.gradle
          cat << 'EOF' > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.gomoku.app'
              compileSdk 34
              defaultConfig {
                  applicationId "com.gomoku.app"
                  minSdk 26
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
                  ndk { abiFilters "arm64-v8a" } // 严格限制纯64位，完美兼容未来安卓系统
              }
          }
          EOF

          # 创建 AndroidManifest.xml
          cat << 'EOF' > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="五子棋智能对战" android:theme="@android:style/Theme.DeviceDefault.NoActionBar">
                  <activity android:name="com.gomoku.app.MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          # 创建 strings.xml
          cat << 'EOF' > app/src/main/res/values/strings.xml
          <resources><string name="app_name">五子棋智能对战</string></resources>
          EOF

      - name: Setup Wrapper
        run: gradle wrapper --gradle-version 8.5

      - name: Wait for Java Code
        run: sleep 2

      - name: Build with Gradle
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Gomoku-AI-64bit-APK
          path: app/build/outputs/apk/debug/app-debug.apk
